[graph]
all-features = true
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
]

[advisories]
unmaintained = "workspace"
unsound = "all"
ignore = [
    # Unsound iterator in glib 0.18. Pulled in on Linux only via
    # tauri 2.10 → tray-icon 0.21 → libappindicator 0.9 → gtk 0.18 → glib 0.18.
    # Not reachable from ministr's own code — the tray icon is the only thing that
    # touches glib, and it doesn't iterate GVariants. Will resolve upstream when
    # tauri ships tray-icon 0.22+ with updated gtk-rs bindings; revisit on every
    # tauri bump.
    "RUSTSEC-2024-0429",
    # Unsoundness in rand 0.7.3 / 0.8.5. Pulled in ONLY as a build dependency
    # via tauri-build → tauri-utils → kuchikiki (HTML parser) → cssparser /
    # selectors → phf_generator. The unsound path requires a custom log logger
    # calling rand::rng() during a reseed — a pure runtime concern. PHF hash
    # seeding runs at build time and never touches the log crate, so the
    # preconditions can't be met. Not in ministr's runtime binary.
    "RUSTSEC-2026-0097",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    # Unreal-aware C++ grammar — strict superset of tree-sitter-cpp,
    # not yet published on crates.io. Pinned to a specific commit in
    # ministr-core/Cargo.toml. Drop this allow-entry once upstream
    # publishes a release crate.
    "https://github.com/taku25/tree-sitter-unreal-cpp",
]
