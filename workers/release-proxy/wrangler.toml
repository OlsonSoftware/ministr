name = "ministr-release-proxy"
main = "src/index.js"
compatibility_date = "2025-10-01"

# One custom domain — dl.ministr.app — fronts this Worker. Wrangler creates
# the DNS record and issues a cert on first deploy. The ministr.app apex
# redirect ruleset is scoped by http.host, so dl.* isn't affected.
[[routes]]
pattern = "dl.ministr.app"
custom_domain = true

# GITHUB_TOKEN is set via `wrangler secret put GITHUB_TOKEN` — never commit.
# GITHUB_REPO has a sensible default inside the Worker, no need to bind.
