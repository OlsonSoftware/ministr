<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0c16"/>
      <stop offset="1" stop-color="#14162a"/>
    </linearGradient>
    <linearGradient id="irisGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a5b4fc"/>
      <stop offset="0.5" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#232748" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.6"/>

  <!-- Subtle iris glow behind title -->
  <circle cx="320" cy="270" r="260" fill="#6366f1" opacity="0.18" filter="blur(48px)"/>

  <!-- Eyebrow -->
  <g transform="translate(96, 168)">
    <circle cx="14" cy="14" r="10" fill="none" stroke="#9da0b2" stroke-width="2"/>
    <text x="42" y="20"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="18"
          letter-spacing="3"
          fill="#9da0b2">MCP SERVER · WRITTEN IN RUST</text>
  </g>

  <!-- Main title -->
  <text x="96" y="340"
        font-family="Inter, -apple-system, sans-serif"
        font-size="200"
        font-weight="700"
        letter-spacing="-6"
        fill="url(#irisGrad)">iris</text>

  <!-- Tagline -->
  <text x="96" y="420"
        font-family="Inter, -apple-system, sans-serif"
        font-size="36"
        font-weight="500"
        fill="#e5e7eb">Context cache for LLM agents</text>

  <text x="96" y="470"
        font-family="Inter, -apple-system, sans-serif"
        font-size="26"
        font-weight="400"
        fill="#9da0b2">Semantic search · session tracking · predictive prefetch</text>
  <text x="96" y="504"
        font-family="Inter, -apple-system, sans-serif"
        font-size="26"
        font-weight="400"
        fill="#9da0b2">budget awareness · code navigation across 12 languages</text>

  <!-- Install chip -->
  <g transform="translate(96, 545)">
    <rect width="420" height="52" rx="10" fill="#191c35" stroke="#232748" stroke-width="1"/>
    <text x="24" y="33"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="20"
          fill="#a5b4fc">$</text>
    <text x="48" y="33"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="20"
          fill="#e5e7eb">claude mcp add iris -- iris</text>
  </g>

  <!-- Right-side stats panel -->
  <g transform="translate(760, 200)">
    <rect width="340" height="230" rx="16" fill="#14162a" stroke="#232748" stroke-width="1"/>

    <text x="24" y="42"
          font-family="ui-monospace, monospace"
          font-size="14"
          letter-spacing="2"
          fill="#6c708a">→ iris_survey("auth middleware")</text>

    <text x="24" y="80"
          font-family="Inter, sans-serif"
          font-size="14"
          fill="#9da0b2">Local embedding</text>
    <text x="316" y="80"
          text-anchor="end"
          font-family="ui-monospace, monospace"
          font-size="18"
          font-weight="700"
          fill="#a5b4fc"
          font-variant-numeric="tabular-nums">~5 ms</text>

    <text x="24" y="115"
          font-family="Inter, sans-serif"
          font-size="14"
          fill="#9da0b2">Warm cache hit</text>
    <text x="316" y="115"
          text-anchor="end"
          font-family="ui-monospace, monospace"
          font-size="18"
          font-weight="700"
          fill="#a5b4fc"
          font-variant-numeric="tabular-nums">&lt; 1 ms</text>

    <text x="24" y="150"
          font-family="Inter, sans-serif"
          font-size="14"
          fill="#9da0b2">Token savings vs grep + cat</text>
    <text x="316" y="150"
          text-anchor="end"
          font-family="ui-monospace, monospace"
          font-size="18"
          font-weight="700"
          fill="#a5b4fc"
          font-variant-numeric="tabular-nums">94 %</text>

    <text x="24" y="185"
          font-family="Inter, sans-serif"
          font-size="14"
          fill="#9da0b2">Languages via tree-sitter</text>
    <text x="316" y="185"
          text-anchor="end"
          font-family="ui-monospace, monospace"
          font-size="18"
          font-weight="700"
          fill="#a5b4fc"
          font-variant-numeric="tabular-nums">12</text>

    <line x1="24" y1="210" x2="316" y2="210" stroke="#232748" stroke-width="1"/>
  </g>
</svg>
