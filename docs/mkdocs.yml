site_name: iris
site_description: Context cache for LLM agents — MCP server with semantic search, code navigation, session tracking, and budget awareness.
site_url: https://AlrikOlson.github.io/iris-rs/
site_author: Alrik Olson
repo_name: AlrikOlson/iris-rs
repo_url: https://github.com/AlrikOlson/iris-rs
edit_uri: edit/main/docs/src/

docs_dir: src
site_dir: book

theme:
  name: material
  custom_dir: overrides
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - content.action.edit
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search
  - d2:
      executable: d2
      cache: true
      cache_dir: .cache/d2
      layout: elk
      theme: 3
      dark_theme: 201
      sketch: false
      pad: 40

nav:
  - Home: index.md
  - Getting started:
      - Installation: installation.md
      - Quick start: getting-started.md
      - Configuration: configuration.md
      - MCP client setup: client-setup.md
  - Architecture:
      - Overview: architecture.md
      - Deep dive: architecture-deep-dive.md
      - Daemon & proxy: architecture-daemon.md
      - Concepts:
          - concepts/README.md
          - Session shadow: concepts/session-shadow.md
          - Prefetch engine: concepts/prefetch-engine.md
          - Budget management: concepts/budget-management.md
          - Coherence: concepts/coherence.md
  - Tool reference:
      - tools/README.md
      - Search & retrieval:
          - iris_survey: tools/survey.md
          - iris_read: tools/read.md
          - iris_extract: tools/extract.md
          - iris_related: tools/related.md
          - iris_toc: tools/toc.md
      - Code navigation:
          - iris_symbols: tools/symbols.md
          - iris_definition: tools/definition.md
          - iris_references: tools/references.md
          - iris_bridge: tools/bridge.md
      - Budget management:
          - iris_budget: tools/budget.md
          - iris_compress: tools/compress.md
          - iris_evicted: tools/evicted.md
      - Multi-source corpora:
          - iris_fetch: tools/fetch.md
          - iris_clone: tools/clone.md
          - iris_refresh: tools/refresh.md
  - CLI:
      - Reference: cli.md
      - iris init: tools/init.md
  - Benchmarks: benchmarks.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AlrikOlson/iris-rs
      name: iris on GitHub
  generator: false

