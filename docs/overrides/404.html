{% extends "main.html" %}

{% block content %}
<div class="iris-404">
  <div class="iris-404__badge">
    <svg class="icon" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true">
      <rect width="256" height="256" fill="none"/>
      <circle cx="112" cy="112" r="80" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/>
      <line x1="168.57" y1="168.57" x2="224" y2="224" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/>
    </svg>
  </div>
  <div class="iris-404__code">404</div>
  <h1 class="iris-404__title">Cache miss.</h1>
  <p class="iris-404__tagline">
    That page isn't in the index. Try the home page, the tool reference, or search.
  </p>
  <div class="iris-404__ctas">
    <a class="iris-404__cta iris-404__cta--primary" href="{{ config.site_url or '/' }}">Go home</a>
    <a class="iris-404__cta iris-404__cta--secondary" href="{{ config.site_url or '/' }}tools/">Tool reference</a>
  </div>
</div>
{% endblock %}
