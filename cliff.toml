# git-cliff — changelog + next-version engine (replaces release-plz).
#
# Why git-cliff directly: release-plz drove changelog generation with
# git-cliff under the hood but wrapped it in a `cargo package` change-
# detection step that re-packaged the whole dependency tree on every
# run (multi-minute, fragile). This repo never publishes to crates.io,
# so none of that is needed. git-cliff alone does version + changelog
# from Conventional Commits in seconds.
#
# Keep-a-Changelog format; one product section per release (all crates
# move in lockstep on a single version — see scripts/ci/release_pr.py).

[changelog]
header = """
# Changelog

All notable changes to ministr will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

## [Unreleased]
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}](https://github.com/OlsonSoftware/ministr/releases/tag/{{ version }}) - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}{% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message | upper_first }}\
{% endfor %}\
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
protect_breaking_commits = true
filter_commits = false
# Only `vX.Y.Z` tags are releases (ignore any stray tags).
tag_pattern = "v[0-9]*"
sort_commits = "newest"
# Same mapping release-plz used: Conventional Commit type → Keep-a-
# Changelog heading; CI/build/chore/test/release noise dropped.
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^sec|^security", group = "Security" },
  { message = "^perf", group = "Changed" },
  { message = "^refactor", group = "Changed" },
  { message = "^docs", group = "Changed" },
  { message = "^ci", skip = true },
  { message = "^build", skip = true },
  { message = "^chore", skip = true },
  { message = "^test", skip = true },
  { message = "^release", skip = true },
  { message = ".*", group = "Changed" },
]
# Strip the trailing PR number "(#123)" → linked reference.
commit_preprocessors = [
  { pattern = '\(#([0-9]+)\)', replace = "([#${1}](https://github.com/OlsonSoftware/ministr/pull/${1}))" },
]

[bump]
# Conventional Commits → semver bump. In 0.x, features bump patch by
# default (Cargo SemVer); breaking still bumps minor in 0.x.
features_always_bump_minor = false
breaking_always_bump_major = false
