app = "iris-mcp"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  RUST_LOG = "iris=info"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 25

[mounts]
  source = "iris_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"
