# ministr corpus configuration — generated by `ministr init`
# Detected: Cargo workspace (6 members), bridges: http_route
#
# ministr automatically ignores target/, node_modules/, __pycache__, .git/, etc.
# Add extra ignore patterns below for project-specific exclusions.

[corpus]
paths = [
    # Source code
    "."
]

ignore = [
    "*.snap",
    "*.pdf",
]

# Hybrid (dense + sparse) retrieval — measured knee for code corpora.
# The default sparse encoder is the zero-model AST/BM25F one (deterministic,
# no download); set sparse_encoder = "splade" to opt into the neural model.
sparse_weight = 0.6

