# ministr corpus configuration — generated by `ministr init`
# Detected: Cargo workspace (6 members), bridges: http_route
#
# ministr automatically ignores target/, node_modules/, __pycache__, .git/, etc.
# Add extra ignore patterns below for project-specific exclusions.

[corpus]
paths = [
    # Source code
    "ministr-api/src",
    "ministr-app/src",
    "ministr-app/src-tauri/src",
    "ministr-cli/src",
    "ministr-core/src",
    "ministr-daemon/src",
    "ministr-mcp/src",

    # Documentation
    "README.md",
    "CHANGELOG.md",
    "DESIGN.md",
    "docs",

    # Research corpus (text-extracted papers on ANN/HNSW/quantization/prefetch)
    "docs/research",
]

ignore = [
    "*.snap",
    "*.pdf",
]
