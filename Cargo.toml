[workspace]
members = ["iris-core", "iris-mcp", "iris-cli"]
resolver = "3"

[workspace.package]
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
repository = "https://github.com/alrik/iris-rs"

[workspace.lints.rust]
unsafe_code = "deny"

[workspace.lints.clippy]
pedantic = { level = "warn", priority = -1 }

[workspace.dependencies]
# Error handling
thiserror = "2"
miette = { version = "7", features = ["fancy"] }

# Async runtime
tokio = { version = "1", features = ["full"] }

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

# Storage
rusqlite = { version = "0.34", features = ["bundled"] }
rusqlite_migration = "2"

# Markdown parsing
comrak = "0.36"

# HTTP client
reqwest = { version = "0.13", default-features = false, features = ["rustls", "charset", "http2"] }
url = "2"

# HTML parsing
scraper = "0.26"

# PDF text extraction
pdf-extract = "0.10"

# Token counting
tiktoken-rs = "0.6"

# Embeddings
fastembed = "5"

# Vector index
hnsw_rs = "0.3"

# XML parsing
quick-xml = "0.37"

# Hashing
sha2 = "0.10"

# File watching
notify = "7"

# Glob pattern matching
glob = "0.3"

# CLI
clap = { version = "4", features = ["derive"] }

# MCP
rmcp = { version = "0.1", features = ["server", "transport-sse", "transport-io"] }

# Testing
tempfile = "3"

# iris workspace crates
iris-core = { path = "iris-core" }
iris-mcp = { path = "iris-mcp" }
