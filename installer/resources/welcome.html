<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    margin: 0; padding: 28px 32px;
    color: #1d1d1f;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  @media (prefers-color-scheme: dark) {
    body { color: #f5f5f7; }
    .subtle { color: #a1a1a6 !important; }
    .badge { background: #2d2d30 !important; color: #f5f5f7 !important; border-color: #424245 !important; }
  }
  h1 {
    font-size: 26px; font-weight: 700;
    letter-spacing: -0.3px;
    margin: 0 0 6px 0;
  }
  .version {
    font-size: 13px; font-weight: 500;
    color: #6e6e73; margin: 0 0 20px 0;
  }
  .tagline {
    font-size: 15px; font-weight: 400;
    margin: 0 0 24px 0;
  }
  .components {
    display: flex; gap: 12px;
    margin: 0 0 24px 0;
  }
  .badge {
    display: inline-block;
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 13px; font-weight: 500;
    background: #f5f5f7;
    border: 1px solid #d2d2d7;
    color: #1d1d1f;
  }
  .subtle {
    font-size: 12px; color: #86868b;
    margin: 0;
  }
</style>
</head>
<body>
  <h1>ministr</h1>
  <p class="version">Version __VERSION__</p>
  <p class="tagline">
    A context cache for LLM agents &mdash; session tracking,
    predictive prefetching, budget awareness, and coherence.
  </p>
  <div class="components">
    <span class="badge">Desktop App</span>
    <span class="badge">CLI Tool</span>
  </div>
  <p class="subtle">
    This installer will place ministr.app in /Applications and the ministr
    command-line tool in /usr/local/bin.
  </p>
</body>
</html>
