[package]
name = "tree-sitter-unreal-cpp"
description = "C++ grammar for tree-sitter"
version = "0.23.4"
authors = [
  "Max Brunsfeld <maxbrunsfeld@gmail.com>",
  "Amaan Qureshi <amaanq12@gmail.com>",
]
license = "MIT"
# Upstream's manifest points at a README.md that was never part of the
# vendored snapshot (only LICENSE + grammar sources were copied at rev
# 92eee7d). A dangling readme path makes `cargo package` fail manifest
# verification; `false` explicitly declares "no readme" without faking
# upstream content. See ../../third_party/tree-sitter-unreal-cpp/VENDOR.md.
readme = false
keywords = ["incremental", "parsing", "tree-sitter", "cpp"]
categories = ["parsing", "text-editors"]
repository = "https://github.com/tree-sitter/tree-sitter-unreal-cpp"
edition = "2021"
autoexamples = false

build = "bindings/rust/build.rs"
include = [
  "LICENSE",
  "bindings/rust/*",
  "./grammar.js",
  "queries/*",
  "src/*",
  "tree-sitter.json",
]

[lib]
path = "bindings/rust/lib.rs"

[dependencies]
tree-sitter-language = "0.1"
tree-sitter = { version = "0.26", optional = true }

[build-dependencies]
cc = "1.2"

[dev-dependencies]
tree-sitter = "0.26.5"
