name: Rust toolchain + persistent target + Tauri stubs
description: |
  One-stop setup for every job in this repo that needs to compile
  Rust. Idempotent and fast on warm self-hosted runners.

  Responsibilities:
    1. Ensure a stable Rust toolchain is on PATH (installs rustup
       only if missing).
    2. Add the requested rustup components.
    3. Point CARGO_TARGET_DIR at a persistent per-runner cache dir
       outside the workspace so `actions/checkout`'s git-clean can't
       wipe compile artifacts between jobs.
    4. Create placeholder Tauri bundle artifacts
       (`ministr-app/src-tauri/binaries/ministr-cli-<triple>` and
       `ministr-app/dist/index.html`). tauri-build and
       `tauri::generate_context!()` probe for these during regular
       cargo check/compile. They're produced by `just pkg`/`pnpm
       build` in real use, but lint/test/doc-tests only need the
       existence checks to pass. The actual build paths are covered
       by mcp-smoke (release build) and docker-build (Linux image).

inputs:
  components:
    description: Comma-separated rustup components (e.g. "clippy,rustfmt")
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Ensure rustup + stable toolchain
      shell: bash
      run: |
        echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
        export PATH="$HOME/.cargo/bin:$PATH"

        if ! command -v rustup >/dev/null 2>&1; then
          echo "installing rustup..."
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal
        fi

        rustup default stable
        if [ -n "${{ inputs.components }}" ]; then
          comps="$(echo '${{ inputs.components }}' | tr ',' ' ')"
          rustup component add $comps
        fi

    - name: Point CARGO_TARGET_DIR at a persistent per-runner cache
      shell: bash
      run: |
        dir="$HOME/.cache/ministr-ci-target-${RUNNER_NAME}"
        mkdir -p "$dir"
        echo "CARGO_TARGET_DIR=$dir" >> "$GITHUB_ENV"
        echo "using CARGO_TARGET_DIR=$dir"

    - name: Stub Tauri bundle artifacts (frontendDist + externalBin)
      shell: bash
      run: |
        triple="$(rustc -vV | awk '/^host:/ {print $2}')"
        mkdir -p ministr-app/src-tauri/binaries
        : > "ministr-app/src-tauri/binaries/ministr-cli-${triple}"
        chmod +x "ministr-app/src-tauri/binaries/ministr-cli-${triple}"
        mkdir -p ministr-app/dist
        : > ministr-app/dist/index.html
