name: Run ci.py
description: |
  Run scripts/ci/ci.py with the right interpreter+shell for the OS,
  from ONE call site. This is the single place the OS split lives —
  release.yml/ci.yml never duplicate a step per platform again.

  Unix: `shell: bash` → python3. Windows: `shell: cmd` → python
  (cmd has no ExecutionPolicy, no WSL, no bash; the broken classes).
  All build *logic* is in ci.py, so behaviour is identical everywhere.

inputs:
  args:
    description: Arguments passed verbatim to ci.py (e.g. "build --target X -p ministr-cli").
    required: true

runs:
  using: composite
  steps:
    - name: ci.py ${{ inputs.args }} (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: python3 scripts/ci/ci.py ${{ inputs.args }}

    - name: ci.py ${{ inputs.args }} (Windows)
      if: runner.os == 'Windows'
      shell: cmd
      run: python scripts\ci\ci.py ${{ inputs.args }}
