name: Release-plz

# Automated release pipeline (see RELEASE.md / release-plz.toml).
#
#   push to main ──▶ release-plz-pr   : opens/updates the "release" PR
#                                       (version bump + CHANGELOG)
#   merge that PR ─▶ release-plz-release : pushes one `vX.Y.Z` tag
#       └──────────▶ release.yml (tag trigger) builds artifacts + Release
#
# release-plz does NOT publish to crates.io and does NOT create the
# GitHub Release (release.yml owns that) — release-plz.toml enforces both.
#
# Token: the default GITHUB_TOKEN cannot trigger other workflows, so a
# tag it pushes would NOT fire release.yml. We use a fine-grained PAT
# (secret RELEASE_PLZ_TOKEN: Contents RW + Pull requests RW) so both the
# Release PR's CI and the downstream tag→release.yml run normally.

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Open/refresh the release PR: version bump + CHANGELOG from commits.
  release-plz-pr:
    name: Release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release-pr
          config: release-plz.toml
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}

  # After the release PR merges, push the single `vX.Y.Z` tag. No
  # crates.io publish (release-plz.toml `publish = false`), no GitHub
  # Release here (release.yml makes it on the tag).
  release-plz-release:
    name: Release tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release
          config: release-plz.toml
        env:
          # PAT (not the default token) so the pushed tag triggers
          # release.yml. No CARGO_REGISTRY_TOKEN — publishing is off.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
