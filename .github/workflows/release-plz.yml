name: Release-plz

# ===================== THE RELEASE CONTRACT =========================
# The ONLY supported way to cut a release:
#   1. land work on `main` (Conventional Commits)
#   2. `release-plz-pr` keeps ONE "chore: release" PR updated
#   3. you review + MERGE that PR
#   4. build-then-tag (this workflow, on the merge commit):
#        gate  → is this the merged release PR? (commit subject)
#        build → call release.yml; build EVERY artifact, no tag yet
#        tag   → ONLY if build is fully green: release-plz pushes the
#                `vX.Y.Z` tag, then the GitHub Release is created with
#                the already-built artifacts attached.
#
# Why build-then-tag: previously the tag was pushed first and the build
# ran off the tag. A build failure (e.g. a flaky runner) left a tag
# stranded at a bad commit that release-plz would never re-release,
# forcing a manual delete-tag-and-recut dance. Now a failed build
# simply fails this run: NO tag, NO Release, nothing to delete. Push a
# fix, the next release PR merge tries again. The pipeline self-heals.
#
# You still never hand-create/move/delete `v*` tags or hand-bump crate
# versions: the merged release PR is the only thing that introduces a
# new version, and the tag is now a *consequence of a green build*.
# ====================================================================
#
# Deviations from the upstream quickstart, required by *our* setup
# (private repo, crates.io disabled, custom build workflow):
#
#  * No CARGO_REGISTRY_TOKEN — release-plz.toml `publish = false`.
#  * RELEASE_PLZ_TOKEN PAT instead of GITHUB_TOKEN: a tag pushed by
#    GITHUB_TOKEN can't trigger other workflows and the PAT also lets
#    the Release PR run CI / sidesteps the "allow Actions to create
#    PRs" org toggle. (release.yml no longer triggers on the tag — it's
#    called directly here — but the PAT is still needed so the pushed
#    tag and Release are attributable and CI-triggering.)
#  * git_release_enable=false in release-plz.toml — the GitHub Release
#    is created here (with artifacts), after the tag, only on green.

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # Open/refresh the release PR: version bump + CHANGELOG from commits.
  release-plz-pr:
    name: Release PR
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'OlsonSoftware' }}
    permissions:
      contents: write
      pull-requests: write
    # Serialize PR runs (never cancel) so a burst of pushes can't race
    # two `release-pr` updates.
    concurrency:
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master @ 2026-05-17
        with:
          # Required when pinned by SHA: the action infers the channel
          # from the `@stable` ref name, which a commit SHA can't convey.
          toolchain: stable
      - uses: release-plz/action@064f4d1e36c843611ddf013be726beaa4ad804db # v0.5.129
        with:
          command: release-pr
          config: release-plz.toml
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}

  # Is HEAD the merge of a release-plz PR? release-plz authors the PR as
  # the conventional commit `chore: release vX.Y.Z` (pr title); the
  # squash/merge subject keeps that prefix. That + the workspace version
  # is all the downstream jobs need. (release_always=false in
  # release-plz.toml is the belt-and-suspenders: even if this gate let a
  # non-release commit through, `release-plz release` would still refuse
  # to tag it.)
  gate:
    name: Detect release commit
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'OlsonSoftware' }}
    outputs:
      is_release: ${{ steps.d.outputs.is_release }}
      version: ${{ steps.d.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: d
        shell: bash
        run: |
          set -euo pipefail
          subj="$(git log -1 --pretty=%s)"
          echo "HEAD subject: $subj"
          if printf '%s' "$subj" | grep -qE '^chore: release'; then
            ver="$(grep -m1 '^version' ministr-cli/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
            if [ -z "$ver" ]; then echo "::error::could not parse version from ministr-cli/Cargo.toml" >&2; exit 1; fi
            echo "release commit detected — version $ver"
            echo "is_release=true"  >> "$GITHUB_OUTPUT"
            echo "version=$ver"     >> "$GITHUB_OUTPUT"
          else
            echo "not a release commit — skipping build/tag"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

  # Build EVERY artifact for this commit. No tag exists yet. If any job
  # in release.yml fails, this job fails → tag-and-release is skipped →
  # nothing is tagged or released.
  build:
    name: Build release artifacts
    needs: gate
    if: ${{ github.repository_owner == 'OlsonSoftware' && needs.gate.outputs.is_release == 'true' }}
    uses: ./.github/workflows/release.yml
    secrets: inherit

  # Green build ⇒ now (and only now) push the tag and publish the
  # GitHub Release with the already-built artifacts.
  tag-and-release:
    name: Tag + GitHub Release
    needs: [gate, build]
    if: ${{ github.repository_owner == 'OlsonSoftware' && needs.gate.outputs.is_release == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write          # push the tag + create the Release
      pull-requests: read      # release-plz detects the merged release PR
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master @ 2026-05-17
        with:
          toolchain: stable

      # Pushes exactly one `vX.Y.Z` tag (git_tag_enable on ministr-cli).
      # No crates.io publish (publish=false), no Release (git_release_
      # enable=false — we make it below, with artifacts). release_always
      # =false means this is still a no-op on a non-release commit.
      - name: release-plz release (push tag)
        uses: release-plz/action@064f4d1e36c843611ddf013be726beaa4ad804db # v0.5.129
        with:
          command: release
          config: release-plz.toml
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Download built artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts
          path: dist

      # The tag now exists (just pushed). Attach every built artifact.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v${{ needs.gate.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.gate.outputs.version, '-') }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
