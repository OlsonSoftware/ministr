name: Release automation

# ===================== THE RELEASE CONTRACT =========================
# Replaces release-plz. The ONLY supported way to cut a release:
#   1. land work on `main` (Conventional Commits)
#   2. `release-pr` keeps ONE `chore: release vX.Y.Z` PR updated
#      (git-cliff computes the version + CHANGELOG — seconds, no cargo
#      packaging; that `cargo package` change-detection was every
#      release-plz hang/failure this repo ever had)
#   3. you review + MERGE that PR
#   4. build-then-tag, on the merge commit:
#        gate  → is HEAD the merged `chore: release` commit?
#        build → call release.yml; build EVERY artifact, no tag yet
#        tag   → ONLY if the build is fully green: push the `vX.Y.Z`
#                tag, then create the GitHub Release with the
#                already-built artifacts attached.
#
# A failed build never strands a tag (nothing is tagged until green).
# Tags are a *consequence of a green build* — never hand-made.
# ====================================================================

on:
  push:
    branches: [main]
    # Docs / markdown / asset / workflow-only pushes never bump a version
    # (git-cliff keys off `feat:`/`fix:`/etc., not `docs:`/`chore:`), so
    # spinning the release runner for them is pure waste. A code push that
    # *does* land work will refresh the `chore: release` PR as normal.
    paths-ignore:
      - '**.md'
      - 'docs-next/**'
      - 'assets/**'
      - '.github/**'

permissions:
  contents: read

jobs:
  # git-cliff → next version + CHANGELOG; bump crates; open/refresh the
  # `chore: release vX.Y.Z` PR. No cargo packaging — ~30s.
  release-pr:
    name: Release PR
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'OlsonSoftware' }}
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-pr-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - name: Install git-cliff
        uses: taiki-e/install-action@ec28e287910af896fd98e04056d31fa68607e7ad
        with:
          tool: git-cliff
      - name: Compute next version + changelog + bump
        id: prep
        run: python3 scripts/ci/release_pr.py
      - name: Open / refresh release PR
        if: ${{ steps.prep.outputs.release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          VER: ${{ steps.prep.outputs.version }}
        run: |
          set -euo pipefail
          br="release/v$VER"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git switch -C "$br"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes to propose"; exit 0
          fi
          git commit -m "chore: release v$VER"
          git push -f origin "$br"
          body="Automated release PR. Merging it builds every artifact (build-then-tag); only on a fully green build is \`v$VER\` tagged and the GitHub Release published. Changelog + version computed by git-cliff from Conventional Commits."
          # Only an OPEN PR counts as existing. `gh pr view <branch>`
          # also returns a MERGED/closed PR for that head, which would
          # make us silently `gh pr edit` a merged PR and never open a
          # new one (the "no new release PR" bug).
          open_pr="$(gh pr list --head "$br" --state open --json number --jq '.[0].number // empty')"
          if [ -n "$open_pr" ]; then
            gh pr edit "$open_pr" --title "chore: release v$VER" --body "$body"
          else
            gh pr create --base main --head "$br" \
              --title "chore: release v$VER" --body "$body" --label release
          fi

  # Does the manifest version still lack its `v<version>` tag?
  #
  # This is the whole anti-deadlock: gate fires on the STATE ("there is
  # a prepared, untagged version"), not on a commit subject. A merged
  # release PR bumps the manifest with no tag yet -> gate true -> build
  # -> tag. If the build fails, no tag is created, so the NEXT push to
  # main still sees an untagged version -> it retries automatically.
  # Nothing can get stranded in a "prepared but untagged" limbo again.
  # Normal commits never touch the product version (release_pr.py only
  # bumps it on the release branch), so gate is false outside a pending
  # release and we never rebuild artifacts for nothing.
  gate:
    name: Detect pending release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'OlsonSoftware' }}
    outputs:
      is_release: ${{ steps.d.outputs.is_release }}
      version: ${{ steps.d.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: d
        shell: bash
        run: |
          set -euo pipefail
          ver="$(grep -m1 '^version' ministr-cli/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          [ -n "$ver" ] || { echo "::error::cannot parse version"; exit 1; }
          if git ls-remote --exit-code --tags origin "refs/tags/v$ver" >/dev/null 2>&1; then
            echo "v$ver is already tagged - nothing to release"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "v$ver has no tag - release pending"
            echo "is_release=true"  >> "$GITHUB_OUTPUT"
            echo "version=$ver"     >> "$GITHUB_OUTPUT"
          fi

  # Build EVERY artifact for this commit. No tag exists yet. Any failure
  # here ⇒ tag-and-release is skipped ⇒ nothing tagged/released.
  build:
    name: Build release artifacts
    needs: gate
    if: ${{ github.repository_owner == 'OlsonSoftware' && needs.gate.outputs.is_release == 'true' }}
    uses: ./.github/workflows/release.yml
    secrets: inherit

  # Green build ⇒ push the tag, then publish the Release with artifacts.
  tag-and-release:
    name: Tag + GitHub Release
    needs: [gate, build]
    if: ${{ github.repository_owner == 'OlsonSoftware' && needs.gate.outputs.is_release == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Push tag (only reached on a fully green build)
        env:
          VER: ${{ needs.gate.outputs.version }}
        run: |
          set -euo pipefail
          # Annotated tags need a committer identity; this fresh
          # checkout has none (the release-pr job sets its own).
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "v$VER" >/dev/null 2>&1; then
            echo "tag v$VER already exists — skipping create"
          else
            git tag -a "v$VER" -m "v$VER"
            git push origin "refs/tags/v$VER"
          fi

      - name: Download built artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v${{ needs.gate.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.gate.outputs.version, '-') }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
