name: Build docs-next

# Builds the Fumadocs-based docs-next/ site on every push that touches it.
# Deploy to GitHub Pages is intentionally commented out — the old mkdocs site
# (docs/) is still the canonical live site at this point. When cutting over:
#   1) Flip "Build docs-next" to deploy (uncomment the deploy job below).
#   2) Rename this workflow: `name: Deploy Documentation` (replaces docs.yml).
#   3) Delete .github/workflows/docs.yml.
#   4) Delete docs/ tree.
# Until then, this workflow just proves the new site compiles cleanly in CI.

on:
  push:
    branches: [main]
    paths:
      - 'docs-next/**'
      - '.github/workflows/docs-next.yml'
  pull_request:
    paths:
      - 'docs-next/**'
      - '.github/workflows/docs-next.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-next
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run types:check

      - name: Build static export
        run: npm run build

      - name: Upload static site
        uses: actions/upload-artifact@v4
        with:
          name: docs-next-site
          path: docs-next/out
          retention-days: 7

  # Uncomment when ready to cut over from mkdocs to docs-next as the live site.
