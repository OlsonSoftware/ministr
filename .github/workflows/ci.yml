name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: "10"
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: short

# Every job runs on the native macOS self-hosted runners registered
# on Alrik's MacBook (labels: self-hosted, macOS, ARM64, m-series).
# Architecture-wise this means:
#
#   - Real Rust toolchain, real Tauri bundle artifacts on disk — no
#     stubbing of sidecar binaries or frontendDist directories.
#   - No "Install Linux build deps" steps; the Mac has a working
#     Tauri toolchain from regular development.
#   - CARGO_TARGET_DIR is a per-runner persistent cache outside the
#     workspace (set by ./.github/actions/rust-setup). Warm jobs only
#     recompile what actually changed.
#   - cargo-{nextest,deny,audit} and just are installed on demand per
#     runner via ./.github/actions/install-cargo-tool and stay cached
#     across subsequent jobs.
#
# Repeated setup lives in two composite actions:
#
#   .github/actions/rust-setup           — toolchain + CARGO_TARGET_DIR
#   .github/actions/install-cargo-tool   — lazy cargo install
#
# Jobs are parallel; add more runners by re-running
# scripts/setup-runners.py NUM=4 when concurrency matters.

jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: [self-hosted, macOS, ARM64, m-series]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
        with:
          components: clippy,rustfmt
      - run: cargo fmt --all -- --check
      - run: |
          cargo clippy --workspace --all-targets --locked \
              -- -D warnings -W clippy::pedantic

  test:
    name: Test
    runs-on: [self-hosted, macOS, ARM64, m-series]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
      - uses: ./.github/actions/install-cargo-tool
        with:
          tool: cargo-nextest
      - run: cargo nextest run --workspace --all-targets --locked

  doctests:
    name: Doc tests
    runs-on: [self-hosted, macOS, ARM64, m-series]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
      - run: cargo test --workspace --doc --locked

  security:
    name: Security (deny + audit)
    runs-on: [self-hosted, macOS, ARM64, m-series]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
      - uses: ./.github/actions/install-cargo-tool
        with:
          tool: cargo-deny
      - uses: ./.github/actions/install-cargo-tool
        with:
          tool: cargo-audit
      - run: cargo deny check
      # Gates only on actual vulnerabilities. Unmaintained-crate
      # warnings and soundness advisories are handled via deny.toml
      # with documented rationales.
      - run: cargo audit

  eval-retrieval:
    name: Retrieval Quality Gate
    runs-on: [self-hosted, macOS, ARM64, m-series]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
      - name: Ensure `just` is installed
        run: |
          if ! command -v just >/dev/null 2>&1; then
            brew install just
          fi
      - run: just eval-gate

  mcp-smoke:
    name: MCP Smoke Test
    runs-on: [self-hosted, macOS, ARM64, m-series]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
      - name: Build release binary
        run: cargo build --release -p ministr-cli --locked
      - name: MCP initialize + tools/list
        run: |
          # Drive the MCP stdio transport: initialize → initialized
          # notification → tools/list. Every response is NDJSON so each
          # JSON-RPC reply lives on its own line.
          response=$(printf '%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"1.0"}},"id":1}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","method":"tools/list","id":2}' \
            | timeout 30 "$CARGO_TARGET_DIR/release/ministr" serve 2>/dev/null || true)

          init_response=$(echo "$response" | jq -c 'select(.id == 1)')
          tools_response=$(echo "$response" | jq -c 'select(.id == 2)')

          test -n "$init_response"  || { echo "no initialize response"; exit 1; }
          test -n "$tools_response" || { echo "no tools/list response"; exit 1; }

          echo "$init_response" | jq -e '.result.serverInfo.name' > /dev/null
          echo "✓ initialize succeeded"

          for tool in ministr_survey ministr_read ministr_extract \
                      ministr_budget ministr_compress ministr_toc; do
            echo "$tools_response" \
              | jq -e --arg t "$tool" '.result.tools[] | select(.name == $t)' \
                > /dev/null
            echo "✓ found tool: $tool"
          done
          echo "✓ MCP smoke test passed"

  docker-build:
    name: Docker Build
    runs-on: [self-hosted, macOS, ARM64, m-series]
    # Uses the Mac's Docker daemon to build the linux/arm64 image.
    # Layer cache lives in the host Docker engine, so warm rebuilds
    # are seconds.
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t ministr:ci .
