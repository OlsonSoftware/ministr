name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      # Tauri 2 requires webkit2gtk + gtk + appindicator + rsvg at build
      # time to compile the desktop-app crate on Linux. Without these,
      # ministr-app/src-tauri fails its system-lib probes. These are
      # the official Tauri 2 Ubuntu prerequisites:
      # https://v2.tauri.app/start/prerequisites/
      - name: Install Tauri Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Run validation
        run: just validate

      - name: Run cargo deny
        run: just deny

      # Gates only on actual vulnerabilities. Unmaintained-crate warnings
      # (gtk-rs bindings pulled in via tauri's Linux tray-icon) and soundness
      # advisories are handled separately in deny.toml with documented
      # ignore rationales.
      - name: Run cargo audit
        run: cargo audit

  eval-retrieval:
    name: Retrieval Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Run retrieval regression gate
        run: just eval-gate

  mcp-smoke:
    name: MCP Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p ministr-cli

      - name: MCP initialize + tools/list
        run: |
          # Drive the MCP stdio transport: initialize → initialized
          # notification → tools/list. Every response is NDJSON so each
          # JSON-RPC reply lives on its own line.
          response=$(printf '%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"1.0"}},"id":1}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","method":"tools/list","id":2}' \
            | timeout 30 ./target/release/ministr serve 2>/dev/null || true)

          # Pick each response by its JSON-RPC id. jq processes the full
          # NDJSON stream and emits only matching documents, so we don't
          # depend on line ordering or substring matches.
          init_response=$(echo "$response" | jq -c 'select(.id == 1)')
          tools_response=$(echo "$response" | jq -c 'select(.id == 2)')

          test -n "$init_response"  || { echo "no initialize response"; exit 1; }
          test -n "$tools_response" || { echo "no tools/list response"; exit 1; }

          echo "$init_response" | jq -e '.result.serverInfo.name' > /dev/null
          echo "✓ initialize succeeded"

          for tool in ministr_survey ministr_read ministr_extract \
                      ministr_budget ministr_compress ministr_toc; do
            echo "$tools_response" \
              | jq -e --arg t "$tool" '.result.tools[] | select(.name == $t)' \
                > /dev/null
            echo "✓ found tool: $tool"
          done
          echo "✓ MCP smoke test passed"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ministr .
