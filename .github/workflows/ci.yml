name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Auto-cancel in-flight runs when a new commit lands on the same PR —
# saves a runner slot and gives faster feedback on the latest push.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: "10"
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: short

# Runner topology: Blacksmith-hosted ephemeral Linux runners.
#
#   rust-ci     → blacksmith-4vcpu-ubuntu-2404  (16 GB RAM — avoids linker OOM)
#   security    → blacksmith-2vcpu-ubuntu-2404
#   docker-build → blacksmith-2vcpu-ubuntu-2404
#
# Caching strategy: Blacksmith sticky disks (NVMe-backed, 3s mount vs
# ~1m6s for GitHub Actions cache). Three separate disks hydrate
# ~/.cargo/registry, ~/.cargo/git, and target/ from the previous run.
# useblacksmith/rust-cache is archived — Swatinem/rust-cache would also
# work (Blacksmith transparently routes it through the 4x colocated
# cache), but sticky disks are ~20x faster.

jobs:
  # ────────────────────────────────────────────────────────────────
  # The big pipeline: one runner, one target dir, every Rust gate.
  # ────────────────────────────────────────────────────────────────
  rust-ci:
    name: Rust CI (fmt → clippy → test → doc → smoke → eval)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri + ministr-app system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf jq

      - uses: ./.github/actions/rust-setup
        with:
          components: clippy,rustfmt

      # Sticky disks — mount BEFORE cargo touches these paths so the
      # hydrated state from previous runs is what cargo sees.
      - name: Sticky disk — cargo registry
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-cargo-registry
          path: /home/runner/.cargo/registry
      - name: Sticky disk — cargo git
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-cargo-git
          path: /home/runner/.cargo/git
      - name: Sticky disk — cargo target
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-cargo-target
          path: ${{ github.workspace }}/target

      # Pre-built binaries — faster than `cargo install` on ephemeral runners.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,just

      # Every cargo step below reuses the job's target/ dir. clippy
      # populates target/debug, nextest adds test binaries, doc-tests
      # add their artifacts, release build populates target/release,
      # mcp-smoke consumes target/release. No redundant compiles.

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (pedantic, --all-targets)
        run: |
          cargo clippy --workspace --all-targets --locked \
              -- -D warnings -W clippy::pedantic

      - name: cargo nextest run (lib + bins + integration)
        run: cargo nextest run --workspace --all-targets --locked

      - name: cargo test --doc
        run: cargo test --workspace --doc --locked

      - name: Build release ministr-cli
        run: cargo build --release -p ministr-cli --locked

      - name: MCP smoke (initialize + tools/list)
        run: |
          response=$(printf '%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"1.0"}},"id":1}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","method":"tools/list","id":2}' \
            | timeout 30 ./target/release/ministr serve 2>/dev/null || true)

          init_response=$(echo "$response" | jq -c 'select(.id == 1)')
          tools_response=$(echo "$response" | jq -c 'select(.id == 2)')

          test -n "$init_response"  || { echo "no initialize response"; exit 1; }
          test -n "$tools_response" || { echo "no tools/list response"; exit 1; }

          echo "$init_response" | jq -e '.result.serverInfo.name' > /dev/null
          echo "✓ initialize succeeded"

          for tool in ministr_survey ministr_read ministr_extract \
                      ministr_budget ministr_compress ministr_toc; do
            echo "$tools_response" \
              | jq -e --arg t "$tool" '.result.tools[] | select(.name == $t)' \
                > /dev/null
            echo "✓ found tool: $tool"
          done
          echo "✓ MCP smoke test passed"

      - name: Retrieval quality gate
        run: just eval-gate

  # ────────────────────────────────────────────────────────────────
  # Independent, fast — runs in parallel.
  # ────────────────────────────────────────────────────────────────
  security:
    name: Security (deny + audit)
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
      # cargo-deny / cargo-audit only read the lockfile + advisory-db,
      # no cargo build happens — registry cache is still worth warming
      # to skip ~30s of index download.
      - name: Sticky disk — cargo registry
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-cargo-registry
          path: /home/runner/.cargo/registry
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - run: cargo deny check
      - run: cargo audit

  docker-build:
    name: Docker Build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: useblacksmith/setup-docker-builder@v1
      - uses: useblacksmith/build-push-action@v2
        with:
          context: .
          push: false
          tags: ministr:ci
