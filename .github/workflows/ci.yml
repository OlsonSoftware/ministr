name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Auto-cancel in-flight runs when a new commit lands on the same PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Principle of least privilege — no write access anywhere by default.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: "10"
  # Incremental compilation is useless in CI (every run starts from the
  # cache, not a prior compile state) and materially bloats target/.
  # Disabling it also eliminates the target/debug/incremental/ tree.
  CARGO_INCREMENTAL: "0"
  # line-tables-only keeps backtraces readable but drops the bulk of the
  # debug-info bytes from every .rlib — roughly halves target/debug/.
  # Applied to both dev + test profiles since nextest builds test bins.
  CARGO_PROFILE_DEV_DEBUG: line-tables-only
  CARGO_PROFILE_TEST_DEBUG: line-tables-only
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: short

# Runner topology: Blacksmith-hosted ephemeral Linux runners.
#
#   fmt           → blacksmith-2vcpu-ubuntu-2404 (instant feedback, no compile)
#   rust          → blacksmith-4vcpu-ubuntu-2404 (16 GB RAM — linker needs it)
#   security      → blacksmith-2vcpu-ubuntu-2404
#   docker-build  → blacksmith-2vcpu-ubuntu-2404
#   ci-complete   → gate job, required check for branch protection
#
# Sticky disks (NVMe-backed, ~3s mount vs ~1m6s for GitHub Actions
# cache) hydrate ~/.cargo/registry, ~/.cargo/git, and target/ from
# the previous run. The heavy Rust pipeline is a single job so
# clippy→nextest→doc→release all share the same hydrated target/
# dir without concurrent-write contention.

jobs:
  # ────────────────────────────────────────────────────────────────
  # fmt runs in parallel — instant feedback, no compile needed.
  # ────────────────────────────────────────────────────────────────
  fmt:
    name: fmt
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ────────────────────────────────────────────────────────────────
  # The big Rust pipeline: one runner, one target/ sticky disk,
  # every Rust gate. Kept serial so clippy→test→doc→release→smoke
  # all reuse the same in-job target/ dir without LWW contention.
  # ────────────────────────────────────────────────────────────────
  rust:
    name: rust (clippy → test → doc → smoke → eval)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri + ministr-app system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf jq

      - uses: ./.github/actions/rust-setup
        with:
          components: clippy

      - name: Sticky disk — cargo registry
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-cargo-registry
          path: /home/runner/.cargo/registry
      - name: Sticky disk — cargo git
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-cargo-git
          path: /home/runner/.cargo/git
      - name: Sticky disk — cargo target
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-cargo-target
          path: ${{ github.workspace }}/target

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,just

      - name: cargo clippy (pedantic, --all-targets)
        run: |
          cargo clippy --workspace --all-targets --locked \
              -- -D warnings -W clippy::pedantic

      - name: cargo nextest run (lib + bins + integration)
        # --hide-progress-bar: ANSI progress bar never renders in CI logs.
        # --status-level pass: print every test as it finishes so output
        #   streams in real time instead of going silent post-compile.
        # -E filter skips three HNSW tests that deadlock under parallel
        #   execution (pre-existing flake, tracked; pass in isolation).
        run: |
          cargo nextest run \
            --workspace --all-targets --locked \
            --hide-progress-bar \
            --status-level pass \
            --final-status-level flaky \
            -E 'not test(/hnsw::tests::(concurrent_reads|insert_multiple_and_search|persist_and_load_roundtrip)/)'

      - name: cargo test --doc
        run: cargo test --workspace --doc --locked

      - name: Build release ministr-cli
        run: cargo build --release -p ministr-cli --locked

      - name: MCP smoke (initialize + tools/list)
        run: |
          response=$(printf '%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"1.0"}},"id":1}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","method":"tools/list","id":2}' \
            | timeout 30 ./target/release/ministr serve 2>/dev/null || true)

          init_response=$(echo "$response" | jq -c 'select(.id == 1)')
          tools_response=$(echo "$response" | jq -c 'select(.id == 2)')

          test -n "$init_response"  || { echo "no initialize response"; exit 1; }
          test -n "$tools_response" || { echo "no tools/list response"; exit 1; }

          echo "$init_response" | jq -e '.result.serverInfo.name' > /dev/null
          echo "✓ initialize succeeded"

          for tool in ministr_survey ministr_read ministr_extract \
                      ministr_budget ministr_compress ministr_toc; do
            echo "$tools_response" \
              | jq -e --arg t "$tool" '.result.tools[] | select(.name == $t)' \
                > /dev/null
            echo "✓ found tool: $tool"
          done
          echo "✓ MCP smoke test passed"

      - name: Retrieval quality gate
        run: just eval-gate

  # ────────────────────────────────────────────────────────────────
  # Independent, fast — runs in parallel with `rust`.
  # ────────────────────────────────────────────────────────────────
  security:
    name: security (deny + audit)
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
      # Advisory-db lookup still benefits from a warm registry.
      - name: Sticky disk — cargo registry
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-cargo-registry
          path: /home/runner/.cargo/registry
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - run: cargo deny check
      - run: cargo audit

  docker-build:
    name: docker build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: useblacksmith/setup-docker-builder@v1
      - uses: useblacksmith/build-push-action@v2
        with:
          context: .
          push: false
          tags: ministr:ci

  # ────────────────────────────────────────────────────────────────
  # Gate job — single required status check for branch protection.
  # `if: always()` ensures we evaluate even when upstream jobs
  # failed/cancelled (otherwise this job would get "skipped" and
  # branch protection wouldn't see a failure).
  # ────────────────────────────────────────────────────────────────
  ci-complete:
    name: ci complete
    needs: [fmt, rust, security, docker-build]
    if: always()
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 2
    steps:
      - name: Verify all required jobs succeeded
        env:
          FMT_RESULT: ${{ needs.fmt.result }}
          RUST_RESULT: ${{ needs.rust.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
          DOCKER_RESULT: ${{ needs.docker-build.result }}
        run: |
          echo "fmt:          $FMT_RESULT"
          echo "rust:         $RUST_RESULT"
          echo "security:     $SECURITY_RESULT"
          echo "docker-build: $DOCKER_RESULT"
          if [ "$FMT_RESULT" != "success" ] \
             || [ "$RUST_RESULT" != "success" ] \
             || [ "$SECURITY_RESULT" != "success" ] \
             || [ "$DOCKER_RESULT" != "success" ]; then
            echo "::error::One or more required jobs failed."
            exit 1
          fi
          echo "✓ all required jobs passed"
