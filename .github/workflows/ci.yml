name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Auto-cancel in-flight runs when a new commit lands on the same PR —
# saves a runner slot and gives faster feedback on the latest push.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: "10"
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: short

# Runner topology (2 native macOS self-hosted runners on Alrik's Mac):
#
#   ministr-native-1 labels: self-hosted, macOS, ARM64, m-series, ministr-primary
#   ministr-native-2 labels: self-hosted, macOS, ARM64, m-series
#
# The heavy `rust-ci` pipeline pins to `ministr-primary` so every
# step in it reuses the same persistent $CARGO_TARGET_DIR — clippy
# warms the debug build, nextest reuses it, doc-tests add their
# bits, release build populates target/release, mcp-smoke uses it.
# Zero redundant compiles.
#
# `security` and `docker-build` need none of that compilation, so
# they run in parallel on the other runner (`m-series`) — or on
# either if `ministr-primary` happens to also be free.

jobs:
  # ────────────────────────────────────────────────────────────────
  # The big pipeline: one runner, one target dir, every Rust gate.
  # ────────────────────────────────────────────────────────────────
  rust-ci:
    name: Rust CI (fmt → clippy → test → doc → smoke → eval)
    runs-on: [self-hosted, macOS, ARM64, ministr-primary]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
        with:
          components: clippy,rustfmt

      # nextest is prerequisite for the test step below; install once
      # per runner, no-op thereafter.
      - uses: ./.github/actions/install-cargo-tool
        with:
          tool: cargo-nextest

      # Every cargo step below shares $CARGO_TARGET_DIR. clippy populates
      # target/debug, nextest reuses it and adds test binaries, doc-tests
      # add their artifacts, release build populates target/release,
      # mcp-smoke consumes target/release. No redundant compiles.

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (pedantic, --all-targets)
        run: |
          cargo clippy --workspace --all-targets --locked \
              -- -D warnings -W clippy::pedantic

      - name: cargo nextest run (lib + bins + integration)
        run: cargo nextest run --workspace --all-targets --locked

      - name: cargo test --doc
        run: cargo test --workspace --doc --locked

      - name: Build release ministr-cli
        run: cargo build --release -p ministr-cli --locked

      - name: MCP smoke (initialize + tools/list)
        run: |
          response=$(printf '%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"1.0"}},"id":1}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","method":"tools/list","id":2}' \
            | timeout 30 "$CARGO_TARGET_DIR/release/ministr" serve 2>/dev/null || true)

          init_response=$(echo "$response" | jq -c 'select(.id == 1)')
          tools_response=$(echo "$response" | jq -c 'select(.id == 2)')

          test -n "$init_response"  || { echo "no initialize response"; exit 1; }
          test -n "$tools_response" || { echo "no tools/list response"; exit 1; }

          echo "$init_response" | jq -e '.result.serverInfo.name' > /dev/null
          echo "✓ initialize succeeded"

          for tool in ministr_survey ministr_read ministr_extract \
                      ministr_budget ministr_compress ministr_toc; do
            echo "$tools_response" \
              | jq -e --arg t "$tool" '.result.tools[] | select(.name == $t)' \
                > /dev/null
            echo "✓ found tool: $tool"
          done
          echo "✓ MCP smoke test passed"

      - name: Retrieval quality gate
        run: |
          if ! command -v just >/dev/null 2>&1; then brew install just; fi
          just eval-gate

  # ────────────────────────────────────────────────────────────────
  # Independent, fast — runs in parallel on any available runner.
  # ────────────────────────────────────────────────────────────────
  security:
    name: Security (deny + audit)
    runs-on: [self-hosted, macOS, ARM64, m-series]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
      - uses: ./.github/actions/install-cargo-tool
        with:
          tool: cargo-deny
      - uses: ./.github/actions/install-cargo-tool
        with:
          tool: cargo-audit
      - run: cargo deny check
      - run: cargo audit

  docker-build:
    name: Docker Build
    runs-on: [self-hosted, macOS, ARM64, m-series]
    # Uses the Mac's Docker daemon (linux/arm64). Layer cache lives
    # in the host engine, so warm rebuilds are seconds.
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t ministr:ci .
