name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Weekly full Docker application-image build. docker-build is otherwise
  # narrowed to only fire on Dockerfile changes (see the `changes` job),
  # so this catches dependency/base-image drift without making every
  # Rust PR pay for a redundant full release cook.
  schedule:
    - cron: "17 4 * * 1"

# Auto-cancel in-flight runs when a new commit lands on the same PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Principle of least privilege — read-only by default. The `ci-image`
# job elevates to `packages: write` to push to GHCR. Every other job
# needs `packages: read` so `container:` can pull the CI image.
permissions:
  contents: read
  packages: read

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: "10"
  # Incremental compilation is useless in CI (every run starts from the
  # cache, not a prior compile state) and materially bloats target/.
  # Disabling it also eliminates the target/debug/incremental/ tree.
  CARGO_INCREMENTAL: "0"
  # line-tables-only keeps backtraces readable but drops the bulk of the
  # debug-info bytes from every .rlib — roughly halves target/debug/.
  # Applied to both dev + test profiles since nextest builds test bins.
  CARGO_PROFILE_DEV_DEBUG: line-tables-only
  CARGO_PROFILE_TEST_DEBUG: line-tables-only
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: short

# Runner topology: two tiers. Heavy jobs that compile the Rust
# workspace go to a large runner; everything else stays on the free
# stock `ubuntu-latest`. The large runner is `vars.CI_RUNNER` (an org/
# repo Actions variable, e.g. a self-hosted label or a GitHub-hosted
# larger-runner name); if it's unset, those jobs transparently fall
# back to `ubuntu-latest` so CI never hard-breaks. See CI-RUNNER-SETUP.md.
#
#   changes        → ubuntu-latest (path-filter, sub-10s)
#   ci-image       → ubuntu-latest (docker build + push, rare)
#   fmt            → ubuntu-latest (no container — rustfmt toolchain)
#   rust-dev       → vars.CI_RUNNER  (heavy: clippy/nextest/doc/eval)
#   rust-release   → vars.CI_RUNNER  (heavy: release build + smoke)
#   security       → ubuntu-latest (cargo-deny/audit, metadata only)
#   docker-build   → vars.CI_RUNNER  (heavy: full release cook; rare)
#   ci-complete    → gate job, required check for branch protection
#
# Path-filtering: a `changes` job classifies the PR/push and every
# expensive downstream job is `if`-gated on it, so the large runner is
# only ever summoned on Rust-source pushes (never docs/markdown). The
# weekly `schedule:` fires docker-build alone. Editing this workflow
# forces every gate back on.
#
# Caching:
#
#   1. ministr-ci image (.github/docker/Dockerfile.ci) — rust toolchain,
#      clippy/cargo-nextest/cargo-deny/cargo-audit/just/sccache + the
#      Tauri/MCP system deps baked in. Built per-Dockerfile-revision by
#      `ci-image`; the compiling jobs pull it via `container:`.
#
#   2. sccache → Cloudflare R2 (SCCACHE_* secrets): a shared, ~unbounded,
#      zero-egress compile cache across runs/branches. A warm run
#      recompiles only changed crates (~3-5 min vs ~15 cold). Unset, it
#      falls back to a local on-disk cache (ideal on a persistent
#      self-hosted runner). This replaces target/ caching entirely.
#
#   3. Swatinem/rust-cache — registry + git dep checkouts only
#      (cache-targets:false). Disjoint `dev` / `release` keys.
#
#        rust-dev     → clippy --all-targets · nextest --lib/bins ·
#                       cargo test --doc · just eval-gate
#        rust-release → cargo build --release -p ministr-cli · MCP smoke

jobs:
  # ────────────────────────────────────────────────────────────────
  # changes: classify which file groups the PR/push touched.
  # Every downstream gate reads these outputs to decide whether to
  # run. Cheap (< 10s), so effectively free overhead on every run.
  # ────────────────────────────────────────────────────────────────
  changes:
    name: detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      security: ${{ steps.filter.outputs.security }}
      docker: ${{ steps.filter.outputs.docker }}
      ci_image: ${{ steps.filter.outputs.ci_image }}
    steps:
      # Need full history — actions/checkout defaults to depth 1, but we
      # diff the PR/push range and both endpoints must be reachable.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # Plain `git diff --name-only <base> <head>` — no third-party
      # action. The job emits booleans consumed by the downstream
      # `if:` gates. Any failure mode falls back to "assume everything
      # changed" so we never silently skip CI on a pathological diff.
      - id: filter
        shell: bash
        env:
          GH_EVENT: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail

          # Regex groups — extended POSIX, matched against the start of
          # each changed-file path. Editing ci.yml itself or the
          # composite rust-setup action force-runs the relevant gates,
          # so we can't skip CI by accident when changing CI.
          # `ministr-app/src/` is the Vite/TS/CSS frontend — it does NOT
          # affect the Rust workspace, so a frontend-only change must not
          # trigger the heavy clippy/nextest jobs. Match the Rust crates
          # explicitly (incl. ministr-app/src-tauri + its Cargo.toml)
          # instead of a blanket `ministr-[^/]+/`.
          CRATES_RE='(ministr-(api|core|daemon|mcp|cli)/|ministr-app/src-tauri/|ministr-app/Cargo\.toml)'
          RUST_RE="^(Cargo\.(toml|lock)|rust-toolchain\.toml|deny\.toml|${CRATES_RE}|\.config/nextest\.toml|justfile|eval/|\.github/workflows/ci\.yml\$|\.github/actions/|\.github/docker/Dockerfile\.ci\$)"
          SECURITY_RE="^(Cargo\.(toml|lock)|deny\.toml|${CRATES_RE}|\.github/workflows/ci\.yml\$|\.github/actions/|\.github/docker/Dockerfile\.ci\$)"
          # docker-build is a full release cook ≈ duplicate of rust-release.
          # Only fire it when the application Dockerfile itself changes;
          # weekly `schedule:` catches base-image / dependency drift.
          DOCKER_RE='^(Dockerfile|\.dockerignore|\.github/workflows/ci\.yml$)'
          CI_IMAGE_RE='^(\.github/docker/Dockerfile\.ci$|\.github/workflows/ci\.yml$)'

          # Fall-through: emit everything as "true" and exit 0. Used
          # when we can't determine a clean diff range (first push to
          # a new branch, force-push dropping the old tip, etc.).
          assume_all_changed() {
            echo "reason: $1 — running every gate"
            {
              echo "rust=true"
              echo "security=true"
              echo "docker=true"
              echo "ci_image=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          }

          # Weekly cron: only the application Docker image build needs to
          # run (dependency / base-image drift). Skip the Rust gates so
          # the scheduled run doesn't pay for a full workspace CI.
          if [ "$GH_EVENT" = "schedule" ]; then
            echo "scheduled run — docker-build only"
            {
              echo "rust=false"
              echo "security=false"
              echo "docker=true"
              echo "ci_image=false"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Resolve the diff endpoints per event type.
          if [ "$GH_EVENT" = "pull_request" ]; then
            BASE="$PR_BASE"
            HEAD="$PR_HEAD"
          elif [ "$GH_EVENT" = "push" ]; then
            BASE="$PUSH_BEFORE"
            HEAD="$PUSH_AFTER"
            # First push to a branch ⇒ "before" is all zeros.
            if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              assume_all_changed "initial push (no prior commit)"
            fi
          else
            assume_all_changed "unhandled event: $GH_EVENT"
          fi

          # Both endpoints must exist in the local clone. Force-push can
          # orphan BASE; fetch-depth:0 above makes this rare but not
          # impossible on very old refs.
          if ! git cat-file -e "$BASE^{commit}" 2>/dev/null; then
            assume_all_changed "base commit $BASE not in local history"
          fi
          if ! git cat-file -e "$HEAD^{commit}" 2>/dev/null; then
            assume_all_changed "head commit $HEAD not in local history"
          fi

          # The actual diff. `...` gives us files changed on the PR/branch
          # relative to the merge-base — robust against main moving forward
          # under us.
          echo "diff: $BASE...$HEAD"
          CHANGED=$(git diff --name-only "$BASE...$HEAD")

          if [ -z "$CHANGED" ]; then
            # No files changed (empty commit, edge case). Skip everything
            # — if nothing changed there's nothing to test.
            echo "no files changed"
            {
              echo "rust=false"
              echo "security=false"
              echo "docker=false"
              echo "ci_image=false"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "$CHANGED" | sed 's/^/  /'

          matches() { printf '%s\n' "$CHANGED" | grep -Eq "$1"; }

          RUST=false
          SECURITY=false
          DOCKER=false
          CI_IMAGE=false
          if matches "$RUST_RE";     then RUST=true;     fi
          if matches "$SECURITY_RE"; then SECURITY=true; fi
          if matches "$DOCKER_RE";   then DOCKER=true;   fi
          if matches "$CI_IMAGE_RE"; then CI_IMAGE=true; fi

          echo "verdict: rust=$RUST security=$SECURITY docker=$DOCKER ci_image=$CI_IMAGE"
          {
            echo "rust=$RUST"
            echo "security=$SECURITY"
            echo "docker=$DOCKER"
            echo "ci_image=$CI_IMAGE"
          } >> "$GITHUB_OUTPUT"

  # ────────────────────────────────────────────────────────────────
  # ci-image: build + push the CI base image to GHCR.
  #
  # Computes a content-hash tag from `.github/docker/Dockerfile.ci`
  # and emits it as an output consumed by every container: job below.
  # Blacksmith's Docker layer cache + cache-from gha make rebuilds
  # that don't change the Dockerfile near-instant (no new layers to
  # upload). First-time build on a fresh Dockerfile revision is ~5-8
  # minutes of apt + cargo-binstall.
  # ────────────────────────────────────────────────────────────────
  ci-image:
    name: ci base image (build + push)
    needs: [changes]
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.security == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    outputs:
      # Both outputs are consumed by every downstream container: block.
      # `image` is the lowercased GHCR path (GHCR rejects uppercase);
      # `tag` is a content-addressed sha slice of Dockerfile.ci.
      image: ${{ steps.image.outputs.ref }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: image
        name: Resolve lowercase image path
        # GitHub repository owners can be mixed-case ("OlsonSoftware"),
        # but GHCR rejects uppercase characters in image paths.
        run: |
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=ghcr.io/${OWNER}/ministr-ci" >> "$GITHUB_OUTPUT"

      - id: tag
        name: Compute image tag (hash of Dockerfile.ci)
        # Short 12-char slice of the Dockerfile content hash. Matches
        # `docker buildx`'s default content-addressed tagging style and
        # keeps `docker pull` lines readable.
        run: |
          TAG="sha-$(sha256sum .github/docker/Dockerfile.ci | cut -c1-12)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image tag: $TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push ministr-ci image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: .github/docker/Dockerfile.ci
          push: true
          tags: |
            ${{ steps.image.outputs.ref }}:${{ steps.tag.outputs.tag }}
            ${{ steps.image.outputs.ref }}:latest
          cache-from: type=gha,scope=ministr-ci
          cache-to: type=gha,mode=max,scope=ministr-ci

  # ────────────────────────────────────────────────────────────────
  # fmt: instant feedback, no compile. Gates the Rust jobs below.
  #
  # Deliberately decoupled from ci-image / the container: rustfmt does
  # not compile anything, so a ~15 s toolchain action on the free
  # runner gives faster feedback than pulling the ~2 GB ministr-ci
  # image — and dropping the `needs: ci-image` edge lets fmt start
  # immediately in parallel with the image bake.
  # ────────────────────────────────────────────────────────────────
  fmt:
    name: fmt
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install rustfmt
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master @ 2026-05-17
        with:
          # Pinned by SHA → channel can't be read from the ref; set it.
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ────────────────────────────────────────────────────────────────
  # rust-dev: dev-profile pipeline, inside ministr-ci.
  # Runs on the large runner (vars.CI_RUNNER); falls back to the free
  # ubuntu-latest if the variable is unset so CI never hard-breaks.
  # sccache(R2) makes a warm run recompile only changed crates (~3-5 min
  # vs ~15 cold). Within this job the steps are serial so clippy →
  # nextest → doc-test → eval-gate all reuse the same dev rlibs.
  # ────────────────────────────────────────────────────────────────
  rust-dev:
    name: rust-dev (clippy → nextest → doc → eval)
    needs: [changes, ci-image, fmt]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 30
    container:
      image: ${{ needs.ci-image.outputs.image }}:${{ needs.ci-image.outputs.tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      # Shared compile cache. With the SCCACHE_* secrets set this is a
      # Cloudflare R2 bucket shared across runs/branches; unset, sccache
      # transparently falls back to an on-disk cache (ideal on a
      # persistent self-hosted runner) — either way CI still works.
      RUSTC_WRAPPER: sccache
      SCCACHE_BUCKET: ${{ secrets.SCCACHE_BUCKET }}
      SCCACHE_ENDPOINT: ${{ secrets.SCCACHE_ENDPOINT }}
      SCCACHE_REGION: auto
      AWS_ACCESS_KEY_ID: ${{ secrets.SCCACHE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCCACHE_R2_SECRET_ACCESS_KEY }}
      # Cap parallel codegen so a cold-cache candle/ort/esaxx compile
      # can't OOM the box; sccache hits make most units near-instant.
      CARGO_BUILD_JOBS: "8"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Registry + git dep checkouts only (NOT target/ — sccache owns
      # compile artifacts). `dev` shared-key stays disjoint from
      # rust-release's `release` key. Harmless no-op on a persistent
      # self-hosted runner where CARGO_HOME is already warm.
      - name: Cargo registry cache (dev)
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: dev
          cache-targets: "false"
          cache-directories: |
            /usr/local/cargo/registry
            /usr/local/cargo/git

      - name: Stub Tauri bundle artifacts
        # tauri-build / `tauri::generate_context!()` probe for the
        # frontendDist index.html and the externalBin sidecar at
        # crate-build time. In prod they're produced by `just pkg` /
        # `pnpm build`; CI only needs the paths to resolve, so empty
        # placeholders are enough.
        run: |
          triple="$(rustc -vV | awk '/^host:/ {print $2}')"
          mkdir -p ministr-app/src-tauri/binaries ministr-app/dist
          : > "ministr-app/src-tauri/binaries/ministr-cli-${triple}"
          chmod +x "ministr-app/src-tauri/binaries/ministr-cli-${triple}"
          : > ministr-app/dist/index.html

      - name: cargo clippy (pedantic, --all-targets)
        run: |
          cargo clippy --workspace --all-targets --locked \
              -- -D warnings -W clippy::pedantic

      - name: cargo nextest run (unit tests — lib + bins)
        # --lib --bins (NOT --all-targets): only run unit tests in
        #   each crate, skipping the tests/ directories. Integration
        #   tests in this workspace include heavy stress/soak cases
        #   (stress_concurrent_clients_on_shared_corpus,
        #   soak_large_corpus_indexing_and_query) + e2e harnesses that
        #   spin up daemons with fastembed/ORT init — these reliably
        #   hang during nextest's --list enumeration on headless Linux.
        # --workspace --exclude ministr-app: ministr-app is a binary-
        #   only Tauri desktop crate; its test binary hangs on static
        #   init against a headless Linux runner (no display, no DBus).
        # Config lives in .config/nextest.toml:
        #   - profile 'ci': streams every test as it completes + final
        #     flaky status; slow-timeout kills hung tests by name.
        #   - override: HNSW tests serialize via threads-required=num-cpus.
        run: |
          cargo nextest run \
            --profile ci \
            --workspace --exclude ministr-app \
            --lib --bins --locked \
            --hide-progress-bar \
            --no-tests=warn

      - name: cargo test --doc
        run: cargo test --workspace --doc --locked

      - name: Retrieval quality gate
        # `just eval-gate` runs `cargo test --test eval_retrieval …`
        # on the dev profile, so it reuses the rlibs built by clippy
        # and nextest above.
        run: just eval-gate

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  # ────────────────────────────────────────────────────────────────
  # rust-release: release-profile pipeline, inside ministr-ci.
  # Large runner (vars.CI_RUNNER) w/ free fallback, sccache(R2) shared
  # cache. Runs in parallel with rust-dev — give the runner pool ≥2
  # concurrency (two self-hosted agents, or hosted autoscale) so the
  # two heavy jobs don't serialize. Only builds ministr-cli (+ deps).
  # ────────────────────────────────────────────────────────────────
  rust-release:
    name: rust-release (build → mcp smoke)
    needs: [changes, ci-image, fmt]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 25
    container:
      image: ${{ needs.ci-image.outputs.image }}:${{ needs.ci-image.outputs.tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_BUCKET: ${{ secrets.SCCACHE_BUCKET }}
      SCCACHE_ENDPOINT: ${{ secrets.SCCACHE_ENDPOINT }}
      SCCACHE_REGION: auto
      AWS_ACCESS_KEY_ID: ${{ secrets.SCCACHE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCCACHE_R2_SECRET_ACCESS_KEY }}
      CARGO_BUILD_JOBS: "8"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Registry + git only; `release` shared-key disjoint from
      # rust-dev's `dev`. sccache owns the compile artifacts.
      - name: Cargo registry cache (release)
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: release
          cache-targets: "false"
          cache-directories: |
            /usr/local/cargo/registry
            /usr/local/cargo/git

      - name: Build release ministr-cli
        run: cargo build --release -p ministr-cli --locked

      - name: MCP smoke (initialize + tools/list)
        # The job here is "did the binary start, handshake, and list
        # tools" — not "validate the JSON-RPC protocol byte-for-byte".
        # Earlier iterations piped through jq, which has to parse the
        # whole stdin stream before producing output: any embedded
        # control char in any tool's schema description (rmcp/schemars
        # round-tripped raw '\n' chars in some cases) makes jq exit
        # non-zero across the entire smoke. grep is parser-agnostic:
        # we just substring-search for the markers we care about. Real
        # protocol validation lives in nextest unit tests.
        #
        # TODO(rmcp-raw-newline): track down the actual source of the
        # raw '\n' in tools/list output and fix it upstream. Suspected
        # culprits: multi-line `///` doc comments on nested response
        # types under `ministr-mcp/src/server/types.rs` (e.g.
        # `ToolResponse`, `BudgetResponse`, `CompressResponse`) being
        # picked up by schemars and round-tripped through rmcp's
        # tool-schema generator without escaping. Once fixed, swap the
        # grep block below back to a single jq pipeline asserting on
        # `.result.tools[].name`.
        run: |
          response=$(printf '%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"1.0"}},"id":1}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","method":"tools/list","id":2}' \
            | timeout 30 ./target/release/ministr serve 2>/dev/null || true)

          echo "── stdout size from ministr serve ──"
          printf '%s' "$response" | wc -c

          # initialize response: jsonrpc framing + id:1 + serverInfo block.
          printf '%s' "$response" | grep -q '"jsonrpc":"2.0"' \
            || { echo "no JSON-RPC frame in stdout"; exit 1; }
          printf '%s' "$response" | grep -Eq '"id":[[:space:]]*1\b' \
            || { echo "no id:1 frame in stdout"; exit 1; }
          printf '%s' "$response" | grep -q '"serverInfo"' \
            || { echo "no serverInfo in initialize response"; exit 1; }
          printf '%s' "$response" | grep -q '"name":"ministr"' \
            || { echo "serverInfo.name != ministr"; exit 1; }
          echo "✓ initialize succeeded"

          # tools/list response: id:2 with each expected tool name.
          printf '%s' "$response" | grep -Eq '"id":[[:space:]]*2\b' \
            || { echo "no id:2 frame in stdout"; exit 1; }
          for tool in ministr_survey ministr_read ministr_extract \
                      ministr_budget ministr_compress ministr_toc; do
            printf '%s' "$response" | grep -q "\"name\":\"$tool\"" \
              || { echo "missing tool: $tool"; exit 1; }
            echo "✓ found tool: $tool"
          done
          echo "✓ MCP smoke test passed"

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  # ────────────────────────────────────────────────────────────────
  # security: cargo-deny + cargo-audit, inside ministr-ci.
  # Independent, fast — runs in parallel with `rust-dev` and
  # `rust-release`. Tools are pre-installed in the image.
  # ────────────────────────────────────────────────────────────────
  security:
    name: security (deny + audit)
    needs: [changes, ci-image]
    if: needs.changes.outputs.security == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: ${{ needs.ci-image.outputs.image }}:${{ needs.ci-image.outputs.tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # Share rust-dev's cache (registry + git) read-only — cargo-deny /
      # cargo-audit only need the crate metadata, not a target/ tree.
      - name: Cargo cache (registry + git)
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: dev
          save-if: false
          cache-directories: |
            /usr/local/cargo/registry
            /usr/local/cargo/git
      - run: cargo deny check
      - run: cargo audit

  # docker-build: full release cook of the application image. Heavy
  # (≈ a duplicate of rust-release), so it runs on the large runner and
  # is narrowly gated — only when the application Dockerfile changes, or
  # weekly via `schedule:` (the `changes` job emits docker=true for
  # both). gha layer cache keeps warm rebuilds cheap.
  docker-build:
    name: docker build
    needs: [changes]
    if: needs.changes.outputs.docker == 'true'
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: false
          tags: ministr:ci
          cache-from: type=gha,scope=ministr-app
          cache-to: type=gha,mode=max,scope=ministr-app

  # ────────────────────────────────────────────────────────────────
  # Gate job — single required status check for branch protection.
  # `if: always()` ensures we evaluate even when upstream jobs were
  # skipped (so branch protection can see a deterministic pass/fail).
  # Accepts `success` or `skipped` for each upstream — skipped means
  # the path filter determined the job wasn't needed for this diff.
  # ────────────────────────────────────────────────────────────────
  ci-complete:
    name: ci complete
    needs: [changes, ci-image, fmt, rust-dev, rust-release, security, docker-build]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify all required jobs succeeded or were intentionally skipped
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          CI_IMAGE_RESULT: ${{ needs.ci-image.result }}
          FMT_RESULT: ${{ needs.fmt.result }}
          RUST_DEV_RESULT: ${{ needs.rust-dev.result }}
          RUST_RELEASE_RESULT: ${{ needs.rust-release.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
          DOCKER_RESULT: ${{ needs.docker-build.result }}
        run: |
          echo "changes:       $CHANGES_RESULT"
          echo "ci-image:      $CI_IMAGE_RESULT"
          echo "fmt:           $FMT_RESULT"
          echo "rust-dev:      $RUST_DEV_RESULT"
          echo "rust-release:  $RUST_RELEASE_RESULT"
          echo "security:      $SECURITY_RESULT"
          echo "docker-build:  $DOCKER_RESULT"

          # The `changes` job MUST have succeeded — it drives gating.
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "::error::paths-filter job did not succeed; can't trust the gates."
            exit 1
          fi

          ok() { [ "$1" = "success" ] || [ "$1" = "skipped" ]; }
          fail=0
          ok "$CI_IMAGE_RESULT"     || { echo "::error::ci-image $CI_IMAGE_RESULT";           fail=1; }
          ok "$FMT_RESULT"          || { echo "::error::fmt $FMT_RESULT";                     fail=1; }
          ok "$RUST_DEV_RESULT"     || { echo "::error::rust-dev $RUST_DEV_RESULT";           fail=1; }
          ok "$RUST_RELEASE_RESULT" || { echo "::error::rust-release $RUST_RELEASE_RESULT";   fail=1; }
          ok "$SECURITY_RESULT"     || { echo "::error::security $SECURITY_RESULT";           fail=1; }
          ok "$DOCKER_RESULT"       || { echo "::error::docker-build $DOCKER_RESULT";         fail=1; }
          [ $fail -eq 0 ] || exit 1
          echo "✓ all required jobs passed or were intentionally skipped"
