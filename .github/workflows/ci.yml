name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"    # smaller cache, and incremental state doesn't survive runs anyway
  CARGO_NET_RETRY: "10"
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: short

# The Rust-heavy jobs run on Alrik's self-hosted arm64 macOS runner
# (labels: self-hosted, macos, arm64, m-series). That box has 18
# cores and 48 GB RAM — ~4.5× the CPU and 3× the memory of
# ubuntu-latest, plus a persistent `target/` between runs — so a
# cold ~8 min cloud run drops to seconds once warm.
#
# Keep one Linux job (mcp-smoke) on ubuntu-latest so we still exercise
# the cross-platform CLI path and Docker Build stays on ubuntu-latest
# because the image itself is Linux.
jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: [self-hosted, macos, arm64]
    env:
      # Persistent target dir outside the workspace so `actions/checkout`
      # doesn't git-clean it between runs. Shared across every Rust job
      # on the runner; the incremental+persisted target/ makes warm
      # runs near-instant.
      CARGO_TARGET_DIR: /Users/alrik/.cache/ministr-ci-target
    steps:
      - uses: actions/checkout@v4

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: |
          cargo clippy --workspace --all-targets --locked \
              -- -D warnings -W clippy::pedantic

  test:
    name: Test
    runs-on: [self-hosted, macos, arm64]
    env:
      CARGO_TARGET_DIR: /Users/alrik/.cache/ministr-ci-target
    steps:
      - uses: actions/checkout@v4

      # Host cargo-nextest install is persistent; only (re)install if
      # missing. Faster than a prebuilt-binary fetch every run.
      - name: Ensure cargo-nextest is installed
        run: |
          if ! command -v cargo-nextest >/dev/null 2>&1; then
            cargo install cargo-nextest --locked
          fi

      - name: cargo nextest run
        run: cargo nextest run --workspace --all-targets --locked

  doctests:
    name: Doc tests
    runs-on: [self-hosted, macos, arm64]
    env:
      CARGO_TARGET_DIR: /Users/alrik/.cache/ministr-ci-target
    steps:
      - uses: actions/checkout@v4

      - name: cargo test --doc
        run: cargo test --workspace --doc --locked

  security:
    name: Security (deny + audit)
    runs-on: [self-hosted, macos, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Ensure cargo-deny + cargo-audit are installed
        run: |
          if ! command -v cargo-deny  >/dev/null 2>&1; then cargo install cargo-deny  --locked; fi
          if ! command -v cargo-audit >/dev/null 2>&1; then cargo install cargo-audit --locked; fi

      - name: cargo deny check
        run: cargo deny check

      - name: cargo audit
        run: cargo audit

  eval-retrieval:
    name: Retrieval Quality Gate
    runs-on: [self-hosted, macos, arm64]
    env:
      CARGO_TARGET_DIR: /Users/alrik/.cache/ministr-ci-target
    steps:
      - uses: actions/checkout@v4

      - name: Ensure just is installed
        run: |
          if ! command -v just >/dev/null 2>&1; then
            brew install just
          fi

      - name: Run retrieval regression gate
        run: just eval-gate

  mcp-smoke:
    name: MCP Smoke Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Release profile lives in a different target/ subdir than the
          # macOS jobs so a separate shared key avoids unnecessary churn.
          shared-key: ministr-ci-linux-release

      - name: Build release binary
        # Authoritative "does ministr-cli compile on Linux" signal. The
        # macOS jobs above don't cover this because candle-metal is
        # Apple-only and the dep graphs diverge.
        run: cargo build --release -p ministr-cli --locked

      - name: MCP initialize + tools/list
        run: |
          # Drive the MCP stdio transport: initialize → initialized
          # notification → tools/list. Every response is NDJSON so each
          # JSON-RPC reply lives on its own line.
          response=$(printf '%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"1.0"}},"id":1}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","method":"tools/list","id":2}' \
            | timeout 30 ./target/release/ministr serve 2>/dev/null || true)

          # Pick each response by its JSON-RPC id — order-independent,
          # substring-match-free.
          init_response=$(echo "$response" | jq -c 'select(.id == 1)')
          tools_response=$(echo "$response" | jq -c 'select(.id == 2)')

          test -n "$init_response"  || { echo "no initialize response"; exit 1; }
          test -n "$tools_response" || { echo "no tools/list response"; exit 1; }

          echo "$init_response" | jq -e '.result.serverInfo.name' > /dev/null
          echo "✓ initialize succeeded"

          for tool in ministr_survey ministr_read ministr_extract \
                      ministr_budget ministr_compress ministr_toc; do
            echo "$tools_response" \
              | jq -e --arg t "$tool" '.result.tools[] | select(.name == $t)' \
                > /dev/null
            echo "✓ found tool: $tool"
          done
          echo "✓ MCP smoke test passed"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: ministr:ci
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
