name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run validation
        run: just validate

      - name: Run cargo deny
        run: just deny

      # Gates only on actual vulnerabilities. Unmaintained-crate warnings
      # (gtk-rs bindings pulled in via tauri's Linux tray-icon) and soundness
      # advisories are handled separately in deny.toml with documented
      # ignore rationales.
      - name: Run cargo audit
        run: cargo audit

  eval-retrieval:
    name: Retrieval Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Run retrieval regression gate
        run: just eval-gate

  mcp-smoke:
    name: MCP Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p ministr-cli

      - name: MCP initialize + tools/list
        run: |
          # Send initialize, initialized notification, and tools/list via stdin
          response=$(printf '%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"1.0"}},"id":1}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","method":"tools/list","id":2}' \
            | timeout 30 ./target/release/ministr serve 2>/dev/null || true)

          # Validate initialize response
          echo "$response" | head -1 | jq -e '.result.serverInfo.name' > /dev/null
          echo "✓ initialize succeeded"

          # Validate tools/list response contains expected tools
          tools_response=$(echo "$response" | grep '"tools"')
          for tool in ministr_survey ministr_read ministr_extract ministr_budget ministr_compress ministr_toc; do
            echo "$tools_response" | jq -e ".result.tools[] | select(.name == \"$tool\")" > /dev/null
            echo "✓ found tool: $tool"
          done
          echo "✓ MCP smoke test passed"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ministr .
