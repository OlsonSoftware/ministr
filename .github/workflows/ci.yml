name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Auto-cancel in-flight runs when a new commit lands on the same PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Principle of least privilege ã no write access anywhere by default.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: "10"
  # Incremental compilation is useless in CI (every run starts from the
  # cache, not a prior compile state) and materially bloats target/.
  # Disabling it also eliminates the target/debug/incremental/ tree.
  CARGO_INCREMENTAL: "0"
  # line-tables-only keeps backtraces readable but drops the bulk of the
  # debug-info bytes from every .rlib ã roughly halves target/debug/.
  # Applied to both dev + test profiles since nextest builds test bins.
  CARGO_PROFILE_DEV_DEBUG: line-tables-only
  CARGO_PROFILE_TEST_DEBUG: line-tables-only
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: short

# Runner topology: Blacksmith-hosted ephemeral Linux runners.
#
#   changes       ã blacksmith-2vcpu-ubuntu-2404 (path-filter, sub-10s)
#   fmt           ã blacksmith-2vcpu-ubuntu-2404 (instant feedback, no compile)
#   rust          ã blacksmith-4vcpu-ubuntu-2404 (16 GB RAM ã linker needs it)
#   security      ã blacksmith-2vcpu-ubuntu-2404
#   docker-build  ã blacksmith-2vcpu-ubuntu-2404
#   ci-complete   ã gate job, required check for branch protection
#
# Path-filtering: a `changes` job classifies the PR/push and every
# expensive downstream job is `if`-gated on it. A docs-only PR (one
# that only touches docs-next/, README, CHANGELOG, etc.) will skip the
# Rust matrix, cargo-deny, and the Docker build entirely ã only `fmt`
# still runs as a sanity check (it's already a 5s job on sticky disks).
# Editing this workflow itself forces every gate back on.
#
# Sticky disks (NVMe-backed, ~3s mount vs ~1m6s for GitHub Actions
# cache) hydrate every piece of per-runner state that's expensive to
# reconstruct: rustup toolchain, cargo-install'd binaries, the crate
# registry, git dependencies, and target/. Shared disks (rustup, cargo
# bin, registry, git) use one key per repo; target/ is the only one
# with contention, and we keep the Rust pipeline serial in one job so
# there's no concurrent-write LWW problem.

jobs:
  # ãããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããã
  # changes: classify which file groups the PR/push touched.
  # Every downstream gate reads these outputs to decide whether to
  # run. Cheap (< 10s), so effectively free overhead on every run.
  # ãããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããã
  changes:
    name: detect changed paths
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 3
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      security: ${{ steps.filter.outputs.security }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      # Need full history ã actions/checkout defaults to depth 1, but we
      # diff the PR/push range and both endpoints must be reachable.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Plain `git diff --name-only <base> <head>` ã no third-party
      # action. The job emits three booleans consumed by the downstream
      # `if:` gates. Any failure mode falls back to "assume everything
      # changed" so we never silently skip CI on a pathological diff.
      - id: filter
        shell: bash
        env:
          GH_EVENT: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail

          # Regex groups ã extended POSIX, matched against the start of
          # each changed-file path. Editing ci.yml itself or the
          # composite rust-setup action force-runs the relevant gates,
          # so we can't skip CI by accident when changing CI.
          RUST_RE='^(Cargo\.(toml|lock)|rust-toolchain\.toml|deny\.toml|ministr-[^/]+/|\.config/nextest\.toml|justfile|eval/|\.github/workflows/ci\.yml$|\.github/actions/)'
          SECURITY_RE='^(Cargo\.(toml|lock)|deny\.toml|ministr-[^/]+/|\.github/workflows/ci\.yml$|\.github/actions/)'
          DOCKER_RE='^(Dockerfile|\.dockerignore|Cargo\.(toml|lock)|ministr-[^/]+/|\.github/workflows/ci\.yml$)'

          # Fall-through: emit all three as "true" and exit 0. Used when
          # we can't determine a clean diff range (first push to a new
          # branch, force-push dropping the old tip, etc.).
          assume_all_changed() {
            echo "reason: $1 ã running every gate"
            {
              echo "rust=true"
              echo "security=true"
              echo "docker=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          }

          # Resolve the diff endpoints per event type.
          if [ "$GH_EVENT" = "pull_request" ]; then
            BASE="$PR_BASE"
            HEAD="$PR_HEAD"
          elif [ "$GH_EVENT" = "push" ]; then
            BASE="$PUSH_BEFORE"
            HEAD="$PUSH_AFTER"
            # First push to a branch ã "before" is all zeros.
            if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              assume_all_changed "initial push (no prior commit)"
            fi
          else
            assume_all_changed "unhandled event: $GH_EVENT"
          fi

          # Both endpoints must exist in the local clone. Force-push can
          # orphan BASE; fetch-depth:0 above makes this rare but not
          # impossible on very old refs.
          if ! git cat-file -e "$BASE^{commit}" 2>/dev/null; then
            assume_all_changed "base commit $BASE not in local history"
          fi
          if ! git cat-file -e "$HEAD^{commit}" 2>/dev/null; then
            assume_all_changed "head commit $HEAD not in local history"
          fi

          # The actual diff. `...` gives us files changed on the PR/branch
          # relative to the merge-base ã robust against main moving forward
          # under us.
          echo "diff: $BASE...$HEAD"
          CHANGED=$(git diff --name-only "$BASE...$HEAD")

          if [ -z "$CHANGED" ]; then
            # No files changed (empty commit, edge case). Skip everything
            # ã if nothing changed there's nothing to test.
            echo "no files changed"
            {
              echo "rust=false"
              echo "security=false"
              echo "docker=false"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "$CHANGED" | sed 's/^/  /'

          matches() { printf '%s\n' "$CHANGED" | grep -Eq "$1"; }

          RUST=false
          SECURITY=false
          DOCKER=false
          if matches "$RUST_RE";     then RUST=true;     fi
          if matches "$SECURITY_RE"; then SECURITY=true; fi
          if matches "$DOCKER_RE";   then DOCKER=true;   fi

          echo "verdict: rust=$RUST security=$SECURITY docker=$DOCKER"
          {
            echo "rust=$RUST"
            echo "security=$SECURITY"
            echo "docker=$DOCKER"
          } >> "$GITHUB_OUTPUT"

  # ãããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããã
  # fmt: instant feedback, no compile. Gates `rust` below ã if fmt
  # fails there's no point burning 10 min of Rust CI on whitespace.
  # ãããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããã
  fmt:
    name: fmt
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Sticky disk ã rustup toolchain
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-rustup
          path: /home/runner/.rustup
      - name: Sticky disk ã cargo bin (rustup wrappers + cargo-install'd tools)
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-cargo-bin
          path: /home/runner/.cargo/bin
      - uses: ./.github/actions/rust-setup
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ãããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããã
  # The big Rust pipeline: one runner, one target/ sticky disk,
  # every Rust gate. Kept serial so clippyãtestãdocãreleaseãsmoke
  # all reuse the same in-job target/ dir without LWW contention.
  # Waits on fmt so whitespace failures don't waste 10 min of CI.
  # ãããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããã
  rust:
    name: rust (clippy ã test ã doc ã smoke ã eval)
    needs: [changes, fmt]
    if: needs.changes.outputs.rust == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri + ministr-app system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf jq

      - name: Sticky disk ã rustup toolchain
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-rustup
          path: /home/runner/.rustup
      - name: Sticky disk ã cargo bin
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-cargo-bin
          path: /home/runner/.cargo/bin
      - name: Sticky disk ã cargo registry
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-cargo-registry
          path: /home/runner/.cargo/registry
      - name: Sticky disk ã cargo git
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-cargo-git
          path: /home/runner/.cargo/git
      - name: Sticky disk ã cargo target
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-cargo-target
          path: ${{ github.workspace }}/target

      - uses: ./.github/actions/rust-setup
        with:
          components: clippy

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,just

      - name: cargo clippy (pedantic, --all-targets)
        run: |
          cargo clippy --workspace --all-targets --locked \
              -- -D warnings -W clippy::pedantic

      - name: cargo nextest run (unit tests ã lib + bins)
        # --lib --bins (NOT --all-targets): only run unit tests in
        #   each crate, skipping the tests/ directories. Integration
        #   tests in this workspace include heavy stress/soak cases
        #   (stress_concurrent_clients_on_shared_corpus,
        #   soak_large_corpus_indexing_and_query) + e2e harnesses that
        #   spin up daemons with fastembed/ORT init ã these reliably
        #   hang during nextest's --list enumeration on headless Linux.
        #   A follow-up job can run integration tests with appropriate
        #   isolation once the main pipeline is green.
        # --workspace --exclude ministr-app: ministr-app is a binary-
        #   only Tauri desktop crate; its test binary hangs on static
        #   init against a headless Linux runner (no display, no DBus).
        # Config lives in .config/nextest.toml:
        #   - profile 'ci': streams every test as it completes + final
        #     flaky status; slow-timeout kills hung tests by name.
        #   - override: HNSW tests serialize via threads-required=num-cpus.
        run: |
          cargo nextest run \
            --profile ci \
            --workspace --exclude ministr-app \
            --lib --bins --locked \
            --hide-progress-bar \
            --no-tests=warn

      - name: cargo test --doc
        run: cargo test --workspace --doc --locked

      - name: Build release ministr-cli
        run: cargo build --release -p ministr-cli --locked

      - name: MCP smoke (initialize + tools/list)
        run: |
          response=$(printf '%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"1.0"}},"id":1}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","method":"tools/list","id":2}' \
            | timeout 30 ./target/release/ministr serve 2>/dev/null || true)

          init_response=$(echo "$response" | jq -c 'select(.id == 1)')
          tools_response=$(echo "$response" | jq -c 'select(.id == 2)')

          test -n "$init_response"  || { echo "no initialize response"; exit 1; }
          test -n "$tools_response" || { echo "no tools/list response"; exit 1; }

          echo "$init_response" | jq -e '.result.serverInfo.name' > /dev/null
          echo "ã initialize succeeded"

          for tool in ministr_survey ministr_read ministr_extract \
                      ministr_budget ministr_compress ministr_toc; do
            echo "$tools_response" \
              | jq -e --arg t "$tool" '.result.tools[] | select(.name == $t)' \
                > /dev/null
            echo "ã found tool: $tool"
          done
          echo "ã MCP smoke test passed"

      - name: Retrieval quality gate
        run: just eval-gate

  # ãããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããã
  # Independent, fast ã runs in parallel with `rust`.
  # ãããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããã
  security:
    name: security (deny + audit)
    needs: [changes]
    if: needs.changes.outputs.security == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Sticky disk ã rustup toolchain
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-rustup
          path: /home/runner/.rustup
      - name: Sticky disk ã cargo bin
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-cargo-bin
          path: /home/runner/.cargo/bin
      - name: Sticky disk ã cargo registry
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-cargo-registry
          path: /home/runner/.cargo/registry
      - uses: ./.github/actions/rust-setup
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - run: cargo deny check
      - run: cargo audit

  docker-build:
    name: docker build
    needs: [changes]
    if: needs.changes.outputs.docker == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: useblacksmith/setup-docker-builder@v1
      - uses: useblacksmith/build-push-action@v2
        with:
          context: .
          push: false
          tags: ministr:ci

  # ãããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããã
  # Gate job ã single required status check for branch protection.
  # `if: always()` ensures we evaluate even when upstream jobs were
  # skipped (so branch protection can see a deterministic pass/fail).
  # Accepts `success` or `skipped` for each upstream ã skipped means
  # the path filter determined the job wasn't needed for this diff.
  # ãããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããã
  ci-complete:
    name: ci complete
    needs: [changes, fmt, rust, security, docker-build]
    if: always()
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 2
    steps:
      - name: Verify all required jobs succeeded or were intentionally skipped
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          FMT_RESULT: ${{ needs.fmt.result }}
          RUST_RESULT: ${{ needs.rust.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
          DOCKER_RESULT: ${{ needs.docker-build.result }}
        run: |
          echo "changes:      $CHANGES_RESULT"
          echo "fmt:          $FMT_RESULT"
          echo "rust:         $RUST_RESULT"
          echo "security:     $SECURITY_RESULT"
          echo "docker-build: $DOCKER_RESULT"

          # The `changes` job MUST have succeeded ã it drives gating.
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "::error::paths-filter job did not succeed; can't trust the gates."
            exit 1
          fi

          ok() { [ "$1" = "success" ] || [ "$1" = "skipped" ]; }
          fail=0
          ok "$FMT_RESULT"      || { echo "::error::fmt $FMT_RESULT";           fail=1; }
          ok "$RUST_RESULT"     || { echo "::error::rust $RUST_RESULT";         fail=1; }
          ok "$SECURITY_RESULT" || { echo "::error::security $SECURITY_RESULT"; fail=1; }
          ok "$DOCKER_RESULT"   || { echo "::error::docker-build $DOCKER_RESULT"; fail=1; }
          [ $fail -eq 0 ] || exit 1
          echo "ã all required jobs passed or were intentionally skipped"
