name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

# Each job is self-contained and runs in parallel. The critical path is
# whichever of lint / test / docker-build is slowest. Past shape:
#   - lint     ~6-8 min cold, ~2-3 min cached
#   - test     ~6-8 min cold, ~2-3 min cached
#   - security  <1 min (prebuilt binaries)
#   - mcp-smoke ~3-5 min cached
#   - docker   ~2-3 min with buildx layer cache, ~10-15 min cold
#   - eval     ~1-2 min
jobs:
  # ────────────────────────────────────────────────────────────────────
  # Shared setup steps reused across lint + test.
  # ────────────────────────────────────────────────────────────────────
  # (factored into the individual jobs below rather than a composite
  # action — GH composite actions force serial step execution and add
  # fetch overhead that cancels the gain.)

  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri Linux build deps
        # ministr-app/src-tauri depends on webkit2gtk + gtk + appindicator
        # + rsvg to compile on Linux. Official Tauri 2 prereqs.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Stub Tauri bundle artifacts
        # tauri-build and `tauri::generate_context!()` run during regular
        # cargo check/compile and probe the filesystem for bundle-time
        # inputs declared in tauri.conf.json:
        #
        #   - binaries/ministr-cli-<triple>  ← externalBin sidecar
        #   - ../dist/                       ← frontendDist (pnpm build output)
        #
        # Neither is produced by cargo; in real use they're built by
        # `just pkg` / `pnpm build`. For lint/test we only need the
        # existence checks to pass — nothing ever runs the sidecar or
        # serves the frontend. Actual Linux coverage for ministr-cli
        # lives in mcp-smoke (full release build + live smoke test).
        run: |
          triple=$(rustc -vV | awk '/^host:/ {print $2}')
          mkdir -p ministr-app/src-tauri/binaries
          : > "ministr-app/src-tauri/binaries/ministr-cli-${triple}"
          chmod +x "ministr-app/src-tauri/binaries/ministr-cli-${triple}"
          mkdir -p ministr-app/dist
          : > ministr-app/dist/index.html

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: |
          cargo clippy --workspace --all-targets \
              -- -D warnings -W clippy::pedantic

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Stub Tauri bundle artifacts
        # See lint job for rationale. tauri-build + generate_context!()
        # probe both paths during compile, neither is produced by cargo.
        run: |
          triple=$(rustc -vV | awk '/^host:/ {print $2}')
          mkdir -p ministr-app/src-tauri/binaries
          : > "ministr-app/src-tauri/binaries/ministr-cli-${triple}"
          chmod +x "ministr-app/src-tauri/binaries/ministr-cli-${triple}"
          mkdir -p ministr-app/dist
          : > ministr-app/dist/index.html

      - name: cargo test (lib + bins + integration)
        # --all-targets excludes doc-tests, which each spawn a standalone
        # linker invocation against the full dep graph. With 130+ doc
        # examples in ministr-core, the cumulative peak linker memory
        # OOMs ubuntu-latest runners (`ld terminated with signal 7
        # [Bus error]`). Doc-tests run in their own job below where
        # they get a fresh runner + memory budget.
        run: cargo test --workspace --all-targets

  doctests:
    name: Doc tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Stub Tauri bundle artifacts
        run: |
          triple=$(rustc -vV | awk '/^host:/ {print $2}')
          mkdir -p ministr-app/src-tauri/binaries
          : > "ministr-app/src-tauri/binaries/ministr-cli-${triple}"
          chmod +x "ministr-app/src-tauri/binaries/ministr-cli-${triple}"
          mkdir -p ministr-app/dist
          : > ministr-app/dist/index.html

      - name: cargo test --doc
        # Doc-tests run in their own job with a fresh runner so the
        # peak linker memory from 130+ standalone doc-example links
        # doesn't collide with the regular test binaries.
        run: cargo test --workspace --doc

  security:
    name: Security (deny + audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Prebuilt binaries — no `cargo install` compile step (was ~2 min each).
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit

      - name: cargo deny check
        run: cargo deny check

      # Gates only on actual vulnerabilities. Unmaintained-crate warnings
      # (gtk-rs bindings pulled in via Tauri's Linux tray-icon) and
      # soundness advisories are handled in deny.toml with documented
      # ignore rationales.
      - name: cargo audit
        run: cargo audit

  eval-retrieval:
    name: Retrieval Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v2

      - name: Run retrieval regression gate
        run: just eval-gate

  mcp-smoke:
    name: MCP Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        # Real Linux build of ministr-cli. This is the authoritative
        # "does the CLI compile on Linux" signal that backs the stub
        # sidecar the lint/test jobs use.
        run: cargo build --release -p ministr-cli

      - name: MCP initialize + tools/list
        run: |
          # Drive the MCP stdio transport: initialize → initialized
          # notification → tools/list. Every response is NDJSON so each
          # JSON-RPC reply lives on its own line.
          response=$(printf '%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"1.0"}},"id":1}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","method":"tools/list","id":2}' \
            | timeout 30 ./target/release/ministr serve 2>/dev/null || true)

          # Pick each response by its JSON-RPC id. jq processes the full
          # NDJSON stream and emits only matching documents, so we don't
          # depend on line ordering or substring matches.
          init_response=$(echo "$response" | jq -c 'select(.id == 1)')
          tools_response=$(echo "$response" | jq -c 'select(.id == 2)')

          test -n "$init_response"  || { echo "no initialize response"; exit 1; }
          test -n "$tools_response" || { echo "no tools/list response"; exit 1; }

          echo "$init_response" | jq -e '.result.serverInfo.name' > /dev/null
          echo "✓ initialize succeeded"

          for tool in ministr_survey ministr_read ministr_extract \
                      ministr_budget ministr_compress ministr_toc; do
            echo "$tools_response" \
              | jq -e --arg t "$tool" '.result.tools[] | select(.name == $t)' \
                > /dev/null
            echo "✓ found tool: $tool"
          done
          echo "✓ MCP smoke test passed"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # buildx + GHA layer cache. First run on a branch is still full
      # cost (~10-15 min), but every subsequent run pulls the Rust dep
      # layer from cache and finishes in ~2-3 min. Without this, every
      # CI run rebuilt ~500 crates from scratch.
      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: ministr:ci
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
