name: Release

# Single workflow → single GitHub Release per version tag.
#
# Triggered by `vX.Y.Z` (or `vX.Y.Z-rc.N`) tags. Builds and publishes
# every artifact a user could want for that version, on every supported
# platform, in one Release:
#
#   - CLI tarballs / zip:    ministr-<target>.tar.gz / .zip
#   - Desktop installers:    ministr-desktop-<target>.<dmg|exe|deb|AppImage>
#   - Aggregated checksums:  SHA256SUMS
#
# The `cli` and `desktop` matrices run in parallel; the final `release`
# job downloads everything and creates the GitHub Release exactly once
# (parallel calls to action-gh-release race each other on same-tag
# uploads — see softprops/action-gh-release issues #445 and #767).

on:
  push:
    # Match v0.2.0, v0.2.0-rc.1, v1.0.0+nightly etc.
    # Reject accidental tags like `vfoo` or pre-existing `v*-app`.
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

concurrency:
  group: release-${{ github.ref }}
  # Don't cancel in-flight releases — they upload artifacts; killing
  # mid-upload leaves a half-published Release.
  cancel-in-progress: false

# Default to read-only; the `release` job below elevates to write.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # CLI tarballs (headless installs, install.sh, Docker, scripted setups)
  # ──────────────────────────────────────────────────────────────────────
  cli:
    name: CLI ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: ministr
            archive: ministr-x86_64-unknown-linux-gnu.tar.gz

          # ARM Linux uses ubuntu-24.04-arm (GitHub-hosted aarch64 runner).
          # ort-sys 2.0.0-rc.11 prebuilts require glibc 2.38+; 24.04 has 2.39.
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            binary: ministr
            archive: ministr-aarch64-unknown-linux-gnu.tar.gz

          - target: aarch64-apple-darwin
            os: macos-latest
            binary: ministr
            archive: ministr-aarch64-apple-darwin.tar.gz

          # x86_64-apple-darwin intentionally omitted: ort-sys 2.0.0-rc.11
          # dropped prebuilt binaries for that target, and macOS 26 dropped
          # Intel x86_64 support repo-wide. Apple Silicon is the supported
          # Mac target; Intel users can run via Rosetta 2 or build from
          # source.

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: ministr.exe
            archive: ministr-x86_64-pc-windows-msvc.zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}

      - name: Disable Defender for build paths (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Add-MpPreference -ExclusionPath "${env:GITHUB_WORKSPACE}"
          Add-MpPreference -ExclusionPath "${env:USERPROFILE}\.cargo"
          Add-MpPreference -ExclusionPath "${env:RUNNER_TEMP}"
          Add-MpPreference -ExclusionProcess "rustc.exe"
          Add-MpPreference -ExclusionProcess "cargo.exe"
          Add-MpPreference -ExclusionProcess "link.exe"
          Add-MpPreference -ExclusionProcess "lld-link.exe"

      - name: Use lld linker on Windows
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: bash
        run: |
          mkdir -p "$HOME/.cargo"
          cat >> "$HOME/.cargo/config.toml" <<'EOF'
          [target.x86_64-pc-windows-msvc]
          linker = "rust-lld"
          rustflags = ["-Clink-arg=-fuse-ld=lld"]
          EOF

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p ministr-cli
        shell: bash

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive }} ${{ matrix.binary }}
          cd ../../..
          shasum -a 256 ${{ matrix.archive }} > ${{ matrix.archive }}.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary }}" -DestinationPath "${{ matrix.archive }}"
          $hash = (Get-FileHash -Algorithm SHA256 "${{ matrix.archive }}").Hash.ToLower()
          "$hash  ${{ matrix.archive }}" | Out-File -Encoding ascii "${{ matrix.archive }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  # ──────────────────────────────────────────────────────────────────────
  # Desktop installers (Tauri bundles: .dmg / NSIS .exe / .deb / AppImage)
  # ──────────────────────────────────────────────────────────────────────
  desktop:
    name: Desktop ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-aarch64
            os: macos-latest
            cli_target: aarch64-apple-darwin
            cli_features: ""
            sidecar_bin: ministr
            sidecar_name: ministr-cli-aarch64-apple-darwin
            tauri_args: "--target aarch64-apple-darwin"
            target_dir: target/aarch64-apple-darwin/release/bundle
            triple: aarch64-apple-darwin

          # Windows builds the CLI sidecar with `--features directml` so the
          # bundled binary uses DirectX 12 GPU embedding. The bare CLI .zip
          # from the `cli` job stays non-DirectML (CI/server-friendly).
          # `--bundles nsis` skips the MSI bundler (which requires a .ico that
          # we don't ship; PNG icons are sufficient for NSIS).
          - platform: windows-x86_64
            os: windows-latest
            cli_target: x86_64-pc-windows-msvc
            cli_features: "directml"
            sidecar_bin: ministr.exe
            sidecar_name: ministr-cli-x86_64-pc-windows-msvc.exe
            tauri_args: "--bundles nsis"
            target_dir: target/release/bundle
            triple: x86_64-pc-windows-msvc

          - platform: linux-x86_64
            os: ubuntu-latest
            cli_target: x86_64-unknown-linux-gnu
            cli_features: ""
            sidecar_bin: ministr
            sidecar_name: ministr-cli-x86_64-unknown-linux-gnu
            tauri_args: ""
            target_dir: target/release/bundle
            triple: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.cli_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.platform }}

      # Big Windows speedup: Microsoft Defender real-time-scans every file
      # `cargo build` writes (hundreds of thousands of small `.rmeta`/`.o`
      # files). Excluding the work tree + cargo dir + linker processes
      # cuts wall-clock by ~30% on Windows runners.
      - name: Disable Defender for build paths (Windows)
        if: matrix.platform == 'windows-x86_64'
        shell: pwsh
        run: |
          Add-MpPreference -ExclusionPath "${env:GITHUB_WORKSPACE}"
          Add-MpPreference -ExclusionPath "${env:USERPROFILE}\.cargo"
          Add-MpPreference -ExclusionPath "${env:RUNNER_TEMP}"
          Add-MpPreference -ExclusionProcess "rustc.exe"
          Add-MpPreference -ExclusionProcess "cargo.exe"
          Add-MpPreference -ExclusionProcess "link.exe"
          Add-MpPreference -ExclusionProcess "lld-link.exe"

      # Use rust-lld instead of MSVC link.exe on Windows. Faster final-link
      # phase, no quality difference for our binaries.
      - name: Use lld linker on Windows
        if: matrix.platform == 'windows-x86_64'
        shell: bash
        run: |
          mkdir -p "$HOME/.cargo"
          cat >> "$HOME/.cargo/config.toml" <<'EOF'
          [target.x86_64-pc-windows-msvc]
          linker = "rust-lld"
          rustflags = ["-Clink-arg=-fuse-ld=lld"]
          EOF

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ministr-app/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: ministr-app
        run: pnpm install --frozen-lockfile

      - name: Install Linux deps
        if: matrix.platform == 'linux-x86_64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Tauri's externalBin sidecar must exist at build time, named
      # `binaries/ministr-cli-<target-triple>` (with `.exe` on Windows).
      # We compile per-platform with the right --features set.
      - name: Build CLI sidecar
        shell: bash
        run: |
          if [ -n "${{ matrix.cli_features }}" ]; then
            cargo build --release --target ${{ matrix.cli_target }} -p ministr-cli --features ${{ matrix.cli_features }}
          else
            cargo build --release --target ${{ matrix.cli_target }} -p ministr-cli
          fi

      - name: Stage sidecar for Tauri externalBin
        shell: bash
        run: |
          mkdir -p ministr-app/src-tauri/binaries
          cp "target/${{ matrix.cli_target }}/release/${{ matrix.sidecar_bin }}" "ministr-app/src-tauri/binaries/${{ matrix.sidecar_name }}"

      # Build-only mode: no tagName / releaseName / releaseId means
      # tauri-action will NOT touch the GitHub Release. We aggregate
      # everything in the final `release` job below.
      #
      # Split into macOS vs. non-macOS steps so the APPLE_* secrets
      # are only materialized in the macOS runner's process env.
      # Windows/Linux shards run an identical step minus the env block.
      #
      # macOS code-signing + notarization: tauri-action reads the six
      # APPLE_* env vars below. If they're unset (no secret bound), the
      # action skips signing gracefully and ships an unsigned .dmg. Bind
      # the secrets on the repo (Settings → Secrets and variables →
      # Actions) and the next release auto-signs without further edits.
      #   APPLE_CERTIFICATE          — base64 of the Developer ID .p12
      #   APPLE_CERTIFICATE_PASSWORD — password used when exporting
      #   APPLE_SIGNING_IDENTITY     — e.g. "Developer ID Application: …"
      #   APPLE_ID                   — Apple Developer account email
      #   APPLE_PASSWORD             — app-specific password (NOT login)
      #   APPLE_TEAM_ID              — 10-char team ID
      - name: Build Tauri bundles (macOS, signed)
        if: matrix.platform == 'macos-aarch64'
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: ministr-app
          tauriScript: pnpm tauri
          args: ${{ matrix.tauri_args }}

      - name: Build Tauri bundles (Windows/Linux)
        if: matrix.platform != 'macos-aarch64'
        uses: tauri-apps/tauri-action@action-v0.6.2
        with:
          projectPath: ministr-app
          tauriScript: pnpm tauri
          args: ${{ matrix.tauri_args }}

      # Wrap the notarized .app in a signed + notarized .pkg installer.
      # Tauri 2.x doesn't ship a .pkg target, so we drive Apple's stock
      # toolchain (pkgbuild → productbuild → notarytool → stapler) directly.
      #
      # The postinstall script symlinks the bundled CLI onto PATH at
      # /usr/local/bin/ministr — so users get a working `ministr` command
      # the moment the installer finishes, with no shell-rc edits.
      #
      # Requires three additional repo secrets beyond the Application cert:
      #   APPLE_INSTALLER_CERTIFICATE          — base64 of Developer ID Installer .p12
      #   APPLE_INSTALLER_CERTIFICATE_PASSWORD — export password for that .p12
      #   APPLE_INSTALLER_SIGNING_IDENTITY     — e.g. "Developer ID Installer: …"
      # If any are unset, this step skips (DMG-only release, same as today).
      - name: Build signed + notarized .pkg installer (macOS)
        if: matrix.platform == 'macos-aarch64' && env.APPLE_INSTALLER_CERTIFICATE != ''
        shell: bash
        env:
          APPLE_INSTALLER_CERTIFICATE: ${{ secrets.APPLE_INSTALLER_CERTIFICATE }}
          APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
          APPLE_INSTALLER_SIGNING_IDENTITY: ${{ secrets.APPLE_INSTALLER_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"

          APP_BUNDLE="target/aarch64-apple-darwin/release/bundle/macos/ministr.app"
          test -d "$APP_BUNDLE" || { echo "ministr.app not found at $APP_BUNDLE"; exit 1; }

          # tauri-action created an ad-hoc keychain and imported the
          # Application cert there. We reuse it for the Installer cert
          # so productbuild can find both certs in one place.
          KEYCHAIN_PATH=$(security list-keychains -d user | awk -F'"' 'NR==1{print $2}')
          CERT_PATH="$RUNNER_TEMP/installer-cert.p12"
          echo "$APPLE_INSTALLER_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$APPLE_INSTALLER_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "" "$KEYCHAIN_PATH" >/dev/null

          # Postinstall: symlink CLI onto PATH (overwrites stale links).
          SCRIPTS_DIR="$RUNNER_TEMP/pkg-scripts"
          mkdir -p "$SCRIPTS_DIR"
          cat > "$SCRIPTS_DIR/postinstall" <<'POSTINSTALL'
          #!/bin/bash
          set -e
          mkdir -p /usr/local/bin
          ln -sf /Applications/ministr.app/Contents/MacOS/ministr-cli /usr/local/bin/ministr
          exit 0
          POSTINSTALL
          chmod +x "$SCRIPTS_DIR/postinstall"

          # Component pkg: the .app + scripts.
          COMPONENT_PKG="$RUNNER_TEMP/ministr-component.pkg"
          pkgbuild \
            --component "$APP_BUNDLE" \
            --install-location /Applications \
            --identifier ai.ministr.desktop \
            --version "$VERSION" \
            --scripts "$SCRIPTS_DIR" \
            "$COMPONENT_PKG"

          # Distribution pkg: signed, what end users double-click.
          mkdir -p _bundles
          DIST_PKG="_bundles/ministr-desktop-aarch64-apple-darwin.pkg"
          productbuild \
            --package "$COMPONENT_PKG" \
            --sign "$APPLE_INSTALLER_SIGNING_IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            "$DIST_PKG"

          # Notarize the signed .pkg. notarytool blocks until Apple
          # responds (typically <2 min for pkgs).
          xcrun notarytool submit "$DIST_PKG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Staple the notarization ticket so installs work offline.
          xcrun stapler staple "$DIST_PKG"

          # sha256 companion (matches the rest of the artifact set).
          shasum -a 256 "$DIST_PKG" > "$DIST_PKG.sha256"
          ls -la _bundles

      # Rename Tauri's `<productName>_<version>_<arch>.<ext>` outputs to
      # our `ministr-desktop-<target-triple>.<ext>` convention. Predictable
      # URLs for the dl.ministr.app Worker and install scripts.
      #
      # NOTE: uses `find` (not bash globstar+brace expansion) for macOS
      # compatibility — macOS ships bash 3.2 which doesn't support `shopt -s
      # globstar`. `find` is universal across Linux/macOS/Git-Bash on Windows.
      - name: Collect and rename desktop bundles
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _bundles
          # Cross-platform sha256: macOS has shasum, Linux + Git-Bash on
          # Windows have sha256sum. Pick whichever is on PATH.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256() { sha256sum "$1"; }
          else
            sha256() { shasum -a 256 "$1"; }
          fi
          while IFS= read -r src; do
            [ -n "$src" ] || continue
            ext="${src##*.}"
            case "$ext" in
              exe)      dst="_bundles/ministr-desktop-${{ matrix.triple }}-setup.exe" ;;
              dmg)      dst="_bundles/ministr-desktop-${{ matrix.triple }}.dmg" ;;
              deb)      dst="_bundles/ministr-desktop-${{ matrix.triple }}.deb" ;;
              AppImage) dst="_bundles/ministr-desktop-${{ matrix.triple }}.AppImage" ;;
              *) continue ;;
            esac
            # Skip if our own pkg-installer step already produced this file.
            [ -e "$dst" ] && continue
            cp "$src" "$dst"
            sha256 "$dst" > "$dst.sha256"
          done < <(find "${{ matrix.target_dir }}" -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.deb' -o -name '*.AppImage' \) 2>/dev/null)
          ls -la _bundles

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: _bundles/*

  # ──────────────────────────────────────────────────────────────────────
  # Single GitHub Release with all artifacts
  # ──────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [cli, desktop]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # One unified SHA256SUMS over every release artifact, so users can
      # verify the whole drop with `shasum -a 256 -c SHA256SUMS`. The
      # per-file `.sha256` companions stay alongside for users who only
      # download one file.
      - name: Aggregate SHA256SUMS
        run: |
          set -euo pipefail
          cd artifacts
          : > SHA256SUMS
          for f in *.tar.gz *.zip *.dmg *.pkg *.exe *.deb *.AppImage; do
            [ -f "$f" ] || continue
            shasum -a 256 "$f" >> SHA256SUMS
          done
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: artifacts/*
