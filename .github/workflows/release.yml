name: Release

# Reusable BUILD-ONLY workflow — builds & uploads every release
# artifact for the CURRENT commit. It creates NO git tag and NO GitHub
# Release.
#
# build-then-tag: release-plz.yml calls this AFTER a release PR is
# merged but BEFORE any tag exists. Only if every job here is green does
# the caller create the tag + GitHub Release. A failed build therefore
# can no longer strand a tag — there is nothing to delete/recut.
#
# Also exposed via workflow_dispatch for an on-demand artifact build of
# an arbitrary ref (debugging / manual recovery) — still no Release.
#
# Architecture (matches ci.yml — see .github/actions/* + scripts/ci/ci.py):
#   * ALL build logic lives in scripts/ci/ci.py, invoked through the
#     ./.github/actions/run-ci-py composite — the ONE place the OS
#     (bash/python3 vs cmd/python) split exists. No per-OS step pairs.
#   * Toolchain + sccache(R2): ./.github/actions/rust-env on Linux/macOS;
#     scripts/ci/win_setup.ps1 on Windows — same warm cache as ci.yml,
#     no container (avoids the empty-image + mutable-:latest footguns).
#   * macOS .pkg signing is `ci.py pkg` (no inline shell mega-script).

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # CLI tarballs / zip
  # ──────────────────────────────────────────────────────────────────────
  cli:
    name: CLI ${{ matrix.target }}
    # Custom-runner routing (fallback = the matrix GitHub-hosted runner):
    #   x86_64 Linux  → vars.CI_RUNNER          (heavy ORT/grammar build)
    #   x86_64 Windows → vars.CI_RUNNER_WINDOWS  (slowest release build)
    runs-on: >-
      ${{ (matrix.target == 'x86_64-unknown-linux-gnu' && (vars.CI_RUNNER || matrix.os))
       || (matrix.target == 'x86_64-pc-windows-msvc' && (vars.CI_RUNNER_WINDOWS || matrix.os))
       || matrix.os }}
    # No container: the rust-env composite (Linux/macOS) and
    # win_setup.ps1 (Windows) provision the identical toolchain+sccache
    # the ministr-ci image has — without an empty-image-validation
    # footgun or a mutable `:latest` race against the CI image publish.
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: ministr
            archive: ministr-x86_64-unknown-linux-gnu.tar.gz

          # ARM Linux: ubuntu-24.04-arm (glibc 2.39 for ort-sys
          # prebuilts). No container — ministr-ci is an amd64 image.
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            binary: ministr
            archive: ministr-aarch64-unknown-linux-gnu.tar.gz

          - target: aarch64-apple-darwin
            os: macos-latest
            binary: ministr
            archive: ministr-aarch64-apple-darwin.tar.gz

          # x86_64-apple-darwin omitted: ort-sys dropped Intel-mac
          # prebuilts; macOS 26 dropped Intel. Apple Silicon is the
          # supported Mac target.

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: ministr.exe
            archive: ministr-x86_64-pc-windows-msvc.zip

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Windows: cmd → idempotent PS bootstrap (toolchain+sccache+Defender).
      - name: Windows bootstrap
        if: runner.os == 'Windows'
        shell: cmd
        env:
          SCCACHE_BUCKET: ${{ secrets.SCCACHE_BUCKET }}
          SCCACHE_ENDPOINT: ${{ secrets.SCCACHE_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.SCCACHE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCCACHE_R2_SECRET_ACCESS_KEY }}
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\ci\win_setup.ps1 -Target ${{ matrix.target }}

      - name: Rust env (Linux/macOS)
        if: runner.os != 'Windows'
        uses: ./.github/actions/rust-env
        with:
          targets: ${{ matrix.target }}
          sccache-bucket: ${{ secrets.SCCACHE_BUCKET }}
          sccache-endpoint: ${{ secrets.SCCACHE_ENDPOINT }}
          aws-access-key-id: ${{ secrets.SCCACHE_R2_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.SCCACHE_R2_SECRET_ACCESS_KEY }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: cli-${{ matrix.target }}
          cache-targets: "false"

      - name: lld linker (Windows target)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        uses: ./.github/actions/run-ci-py
        with:
          args: lld-config

      - name: Build ministr-cli
        uses: ./.github/actions/run-ci-py
        with:
          args: build --target ${{ matrix.target }} -p ministr-cli

      - name: Package
        uses: ./.github/actions/run-ci-py
        with:
          args: package-cli --target ${{ matrix.target }} --binary ${{ matrix.binary }} --archive ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-${{ matrix.target }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  # ──────────────────────────────────────────────────────────────────────
  # Desktop installers (Tauri: .pkg / NSIS .exe / .deb / .rpm / AppImage)
  # ──────────────────────────────────────────────────────────────────────
  desktop:
    name: Desktop ${{ matrix.platform }}
    runs-on: >-
      ${{ (matrix.platform == 'linux-x86_64' && (vars.CI_RUNNER || matrix.os))
       || (matrix.platform == 'windows-x86_64' && (vars.CI_RUNNER_WINDOWS || matrix.os))
       || matrix.os }}
    # No container (see cli job): rust-env / win_setup.ps1 provision the
    # toolchain+sccache; avoids the empty-image + :latest-race footguns.
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS: signed+notarized .pkg (built post-tauri-action). Tauri
          # makes only the .app (`--bundles app`); .pkg via `ci.py pkg`.
          - platform: macos-aarch64
            os: macos-latest
            cli_target: aarch64-apple-darwin
            cli_features: ""
            sidecar_bin: ministr
            sidecar_name: ministr-cli-aarch64-apple-darwin
            tauri_args: "--target aarch64-apple-darwin --bundles app"
            target_dir: target/aarch64-apple-darwin/release/bundle
            triple: aarch64-apple-darwin

          # Windows: sidecar built with directml (DX12 GPU embedding);
          # `--bundles nsis` (no MSI — needs a .ico we don't ship).
          - platform: windows-x86_64
            os: windows-latest
            cli_target: x86_64-pc-windows-msvc
            cli_features: directml
            sidecar_bin: ministr.exe
            sidecar_name: ministr-cli-x86_64-pc-windows-msvc.exe
            tauri_args: "--bundles nsis"
            target_dir: target/release/bundle
            triple: x86_64-pc-windows-msvc

          - platform: linux-x86_64
            os: ubuntu-latest
            cli_target: x86_64-unknown-linux-gnu
            cli_features: ""
            sidecar_bin: ministr
            sidecar_name: ministr-cli-x86_64-unknown-linux-gnu
            tauri_args: ""
            target_dir: target/release/bundle
            triple: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Windows bootstrap
        if: matrix.platform == 'windows-x86_64'
        shell: cmd
        env:
          SCCACHE_BUCKET: ${{ secrets.SCCACHE_BUCKET }}
          SCCACHE_ENDPOINT: ${{ secrets.SCCACHE_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.SCCACHE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCCACHE_R2_SECRET_ACCESS_KEY }}
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\ci\win_setup.ps1 -Target ${{ matrix.cli_target }}

      - name: Rust env (Linux/macOS)
        if: matrix.platform != 'windows-x86_64'
        uses: ./.github/actions/rust-env
        with:
          targets: ${{ matrix.cli_target }}
          sccache-bucket: ${{ secrets.SCCACHE_BUCKET }}
          sccache-endpoint: ${{ secrets.SCCACHE_ENDPOINT }}
          aws-access-key-id: ${{ secrets.SCCACHE_R2_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.SCCACHE_R2_SECRET_ACCESS_KEY }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: desktop-${{ matrix.platform }}
          cache-targets: "false"

      - name: lld linker (Windows)
        if: matrix.platform == 'windows-x86_64'
        uses: ./.github/actions/run-ci-py
        with:
          args: lld-config

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ministr-app/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: ministr-app
        run: pnpm install --frozen-lockfile

      - name: Install Linux desktop deps
        if: matrix.platform == 'linux-x86_64'
        shell: bash
        run: |
          sudo apt-get update
          # rpm provides rpmbuild for Tauri's RPM bundler. (webkit/rsvg/
          # appindicator are baked into ministr-ci but re-ensured here so
          # this also works on a bare host.)
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      # Tauri externalBin sidecar (per-platform features) — one ci.py path.
      - name: Build CLI sidecar
        uses: ./.github/actions/run-ci-py
        with:
          args: build --target ${{ matrix.cli_target }} -p ministr-cli ${{ matrix.cli_features != '' && format('--features {0}', matrix.cli_features) || '' }}

      - name: Stage sidecar for Tauri externalBin
        uses: ./.github/actions/run-ci-py
        with:
          args: stage-sidecar --target ${{ matrix.cli_target }} --src ${{ matrix.sidecar_bin }} --dst ${{ matrix.sidecar_name }}

      # macOS needs all nine Apple secrets (app cert + notarization +
      # installer cert). With `--bundles app` there's no unsigned
      # fallback, so validate up front and fail loudly.
      - name: Validate macOS signing secrets
        if: matrix.platform == 'macos-aarch64'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_INSTALLER_CERTIFICATE: ${{ secrets.APPLE_INSTALLER_CERTIFICATE }}
          APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
          APPLE_INSTALLER_SIGNING_IDENTITY: ${{ secrets.APPLE_INSTALLER_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          miss=()
          for v in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY \
                   APPLE_INSTALLER_CERTIFICATE APPLE_INSTALLER_CERTIFICATE_PASSWORD \
                   APPLE_INSTALLER_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            [ -n "${!v:-}" ] || miss+=("$v")
          done
          if [ ${#miss[@]} -gt 0 ]; then
            echo "::error::Missing macOS signing secret(s): ${miss[*]}. Bind all nine (Settings → Secrets → Actions) and re-run." >&2
            exit 1
          fi

      - name: Build Tauri bundles (macOS, signed)
        if: matrix.platform == 'macos-aarch64'
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: ministr-app
          tauriScript: pnpm tauri
          args: ${{ matrix.tauri_args }}

      - name: Build Tauri bundles (Windows/Linux)
        if: matrix.platform != 'macos-aarch64'
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        with:
          projectPath: ministr-app
          tauriScript: pnpm tauri
          args: ${{ matrix.tauri_args }}

      # Wrap the notarized .app in a signed+notarized .pkg — full Python
      # (scripts/ci/ci.py pkg): pkgbuild→productbuild→notarytool→stapler
      # + the non-clobbering CLI-symlink postinstall. macOS only.
      - name: Build signed .pkg (macOS)
        if: matrix.platform == 'macos-aarch64'
        uses: ./.github/actions/run-ci-py
        env:
          APPLE_INSTALLER_CERTIFICATE: ${{ secrets.APPLE_INSTALLER_CERTIFICATE }}
          APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
          APPLE_INSTALLER_SIGNING_IDENTITY: ${{ secrets.APPLE_INSTALLER_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          args: pkg

      # Rename Tauri outputs to ministr-desktop-<triple>.<ext> + sha256.
      # macOS is excluded: its only artifact is the .pkg, already placed
      # in _bundles by `ci.py pkg` (collect-bundles only handles
      # exe/deb/rpm/AppImage and would error finding none).
      - name: Collect and rename desktop bundles
        if: matrix.platform != 'macos-aarch64'
        uses: ./.github/actions/run-ci-py
        with:
          args: collect-bundles --target-dir ${{ matrix.target_dir }} --triple ${{ matrix.triple }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desktop-${{ matrix.platform }}
          path: _bundles/*

  # ──────────────────────────────────────────────────────────────────────
  # Bundle every artifact + unified SHA256SUMS into ONE downloadable
  # artifact. NO GitHub Release here — build-then-tag: the caller
  # (release-plz.yml) tags and creates the Release only if this whole
  # workflow is green.
  # ──────────────────────────────────────────────────────────────────────
  bundle:
    name: Bundle artifacts
    needs: [cli, desktop]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      # One unified SHA256SUMS over every artifact (ci.py, not inline sh).
      - name: Aggregate SHA256SUMS
        uses: ./.github/actions/run-ci-py
        with:
          args: checksums --dir artifacts

      # Single artifact the caller downloads to attach to the Release it
      # creates *after* it has pushed the tag.
      - name: Upload combined release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-artifacts
          path: artifacts/*
          if-no-files-found: error
