name: Release

on:
  push:
    tags:
      - "v*"

# Don't cancel in-flight releases — they upload artifacts; killing
# mid-upload leaves a half-published release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Default to read-only; the `release` job below elevates to write.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: blacksmith-4vcpu-ubuntu-2404
            binary: ministr
            archive: ministr-x86_64-unknown-linux-gnu.tar.gz

          # Native ARM runner — no QEMU emulation via `cross` needed.
          - target: aarch64-unknown-linux-gnu
            os: blacksmith-4vcpu-ubuntu-2204-arm
            binary: ministr
            archive: ministr-aarch64-unknown-linux-gnu.tar.gz

          - target: aarch64-apple-darwin
            os: macos-latest
            binary: ministr
            archive: ministr-aarch64-apple-darwin.tar.gz

          # x86_64-apple-darwin intentionally omitted: ort-sys 2.0.0-rc.11
          # dropped prebuilt binaries for that target, and macOS 26 dropped
          # Intel x86_64 support repo-wide. Apple Silicon (aarch64) is the
          # supported Mac target; Intel users can run via Rosetta 2 or build
          # from source.

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: ministr.exe
            archive: ministr-x86_64-pc-windows-msvc.zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p ministr-cli
        shell: bash

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive }} ${{ matrix.binary }}
          cd ../../..
          shasum -a 256 ${{ matrix.archive }} > ${{ matrix.archive }}.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary }}" -DestinationPath "${{ matrix.archive }}"
          $hash = (Get-FileHash -Algorithm SHA256 "${{ matrix.archive }}").Hash.ToLower()
          "$hash  ${{ matrix.archive }}" | Out-File -Encoding ascii "${{ matrix.archive }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  # Windows desktop installer (Tauri NSIS bundle). Produces the .exe
  # users actually want — tray app + bundled CLI + PATH wired up via
  # installer-hooks.nsh. The bare CLI .zip from the matrix above is
  # kept for headless / scripted installs (`install.ps1`).
  bundle-windows:
    name: Bundle Windows desktop installer
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: bundle-windows

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ministr-app/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: ministr-app
        run: pnpm install --frozen-lockfile

      # Build the CLI first so we can stage it as the Tauri sidecar.
      # `--features directml` enables fastembed's DirectML execution
      # provider so embedding runs on any DX12 GPU at runtime; matches
      # what scripts/reinstall.ps1 ships locally.
      - name: Build CLI sidecar (with directml)
        run: cargo build --release -p ministr-cli --features directml

      - name: Stage sidecar for Tauri externalBin
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "ministr-app/src-tauri/binaries" | Out-Null
          Copy-Item -Force "target/release/ministr.exe" "ministr-app/src-tauri/binaries/ministr-cli-x86_64-pc-windows-msvc.exe"

      # NSIS only for v0 — MSI needs WiX and is enterprise-flavoured;
      # we can layer it on later without breaking anyone.
      - name: Build Tauri app + NSIS installer
        working-directory: ministr-app
        run: pnpm tauri build --bundles nsis

      - name: Stage release assets
        shell: pwsh
        run: |
          $version = (Get-Content ministr-app/src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $src = "target/release/bundle/nsis/ministr_${version}_x64-setup.exe"
          if (-not (Test-Path $src)) { throw "expected NSIS bundle at $src — Tauri output layout may have changed" }
          $dst = "ministr-desktop-x86_64-pc-windows-msvc-setup.exe"
          Copy-Item -Force $src $dst
          $hash = (Get-FileHash -Algorithm SHA256 $dst).Hash.ToLower()
          "$hash  $dst" | Out-File -Encoding ascii "$dst.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ministr-desktop-x86_64-pc-windows-msvc-setup.exe
          path: |
            ministr-desktop-x86_64-pc-windows-msvc-setup.exe
            ministr-desktop-x86_64-pc-windows-msvc-setup.exe.sha256

  release:
    name: Create Release
    needs: [build, bundle-windows]
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    # Only this job needs write access to create the GitHub Release.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*
