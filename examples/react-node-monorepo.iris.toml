# iris config for a React + Node.js monorepo
#
# Typical layout (pnpm/npm/yarn workspaces):
#   packages/ui/src/      — React component library
#   packages/api/src/     — Express/Fastify backend
#   packages/shared/src/  — shared types and utilities
#   apps/web/src/         — Next.js app
#   docs/                 — project docs
#
# iris indexes all workspace packages and detects HTTP route bridges
# between frontend fetch calls and backend route handlers.

[corpus]
paths = [
    # Workspace packages
    "packages/ui/src",
    "packages/api/src",
    "packages/shared/src",
    "apps/web/src",

    # Documentation
    "docs",
    "README.md",
]

ignore = [
    "*.test.ts",           # test files
    "*.spec.ts",
    "*.test.js",
    "*.spec.js",
    "*.stories.tsx",       # Storybook stories
]
