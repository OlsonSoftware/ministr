# release-plz — automated Release-PR + tagging for the ministr workspace.
#
# Model: every push to `main` updates a single "release" PR that bumps the
# version and the CHANGELOG from Conventional Commits. Merging that PR makes
# release-plz push exactly one `vX.Y.Z` tag, which triggers the EXISTING
# `.github/workflows/release.yml` (artifact builds + the GitHub Release).
# release-plz itself does NOT publish to crates.io and does NOT create the
# GitHub Release — see RELEASE.md.

[workspace]
# Private repo: crates.io publishing stays disabled (was the old policy).
publish = false
# GUARD: never tag/release on an arbitrary push — only when the commit
# is a MERGED release-plz PR. Default `true` releases any untagged
# manifest version on every push (the footgun that auto-released a
# stray 0.2.3). With this, `release.yml` can only ever fire as the
# direct consequence of merging the reviewed release PR.
release_always = false
# release.yml already creates the GitHub Release with every artifact when
# the tag lands — don't let release-plz create a second, empty one.
git_release_enable = false
# cargo-semver-checks builds rustdoc for the whole workspace (ort,
# candle, tokenizers, …) — minutes of pointless work for crates we
# never publish. Off: this is what made `release-pr` look "stuck".
semver_check = false
# Single `v{{version}}` tag scheme for ALL packages. This is what
# release-plz uses to find the *last* release (so it diffs commits
# since `v0.2.3` and bumps from there) AND to name the new tag.
# Creation is still gated to one package via git_tag_enable below, so
# we get exactly one tag, not six.
git_tag_name = "v{{ version }}"
git_tag_enable = false
# One aggregated changelog at the repo root.
changelog_update = true
changelog_path = "CHANGELOG.md"
# Marks the bot PR so it's easy to spot and branch-protect.
pr_labels = ["release"]

# ── All six crates move in lockstep on ONE product version ──────────────
# (mirrors the old `just release`: a single product version, not
# independent per-crate semver). ministr-cli owns the single tag.

# The vendored grammar is a path dependency, not ours to release —
# fully exclude it (no version bump, changelog, or tag).
[[package]]
name = "tree-sitter-unreal-cpp"
release = false

# ministr-cli is the umbrella: it owns the single `v{{version}}` tag AND
# the single CHANGELOG section. `changelog_include` folds the sibling
# crates' commits into ministr-cli's entry, and the siblings set
# `changelog_update = false` so they don't each emit their own
# `## [x.y.z]` block — that per-crate duplication is what corrupted the
# old CHANGELOG. Net: one product section per release.
[[package]]
name = "ministr-cli"
version_group = "ministr"
git_tag_enable = true
changelog_include = [
  "ministr-api",
  "ministr-core",
  "ministr-daemon",
  "ministr-mcp",
  "ministr-app",
]

[[package]]
name = "ministr-api"
version_group = "ministr"
changelog_update = false

[[package]]
name = "ministr-core"
version_group = "ministr"
changelog_update = false

[[package]]
name = "ministr-daemon"
version_group = "ministr"
changelog_update = false

[[package]]
name = "ministr-mcp"
version_group = "ministr"
changelog_update = false

[[package]]
name = "ministr-app"
version_group = "ministr"
changelog_update = false

# ── Changelog grouping (git-cliff under the hood) ───────────────────────
# Map Conventional Commit types onto the existing Keep-a-Changelog
# Added / Changed / Fixed / Security headings; drop CI/chore/test noise.
[changelog]
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^sec|^security", group = "Security" },
  { message = "^perf", group = "Changed" },
  { message = "^refactor", group = "Changed" },
  { message = "^docs", group = "Changed" },
  { message = "^ci", skip = true },
  { message = "^build", skip = true },
  { message = "^chore", skip = true },
  { message = "^test", skip = true },
  { message = "^release", skip = true },
  { message = ".*", group = "Changed" },
]
