<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>ministr — coming soon</title>
  <style>
    /* ministr v2 tokens (web/app/tokens.css) — kept inline so this page is
       fully self-contained and deployable without a build. */
    :root {
      --bg: #16130E;
      --ink: #EDEAE4;
      --ink-2: #C0BCB4;
      --rule: #2A2620;
      --rule-2: #38332B;
      --amber: #F59E0B;
      --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--mono);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    ::selection { background: var(--amber); color: var(--bg); }
    .panel {
      border: 1px solid var(--rule);
      padding: 56px 64px;
      max-width: 560px;
      width: 100%;
    }
    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-2);
      padding-bottom: 20px;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--rule);
    }
    .eyebrow b { color: var(--amber); font-weight: 600; }
    .brand { display: flex; align-items: center; gap: 18px; }
    .logo { width: 44px; height: 44px; flex: none; display: block; }
    .wordmark {
      font-size: 40px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
    .wordmark .dot { color: var(--amber); }
    .cursor {
      display: inline-block;
      width: 0.55em;
      color: var(--amber);
      animation: blink 1.1s steps(1) infinite;
    }
    @media (prefers-reduced-motion: reduce) { .cursor { animation: none; } }
    @keyframes blink { 50% { opacity: 0; } }
    .line {
      margin-top: 18px;
      font-size: 13.5px;
      line-height: 1.7;
      color: var(--ink-2);
      max-width: 44ch;
    }
    .foot {
      margin-top: 32px;
      padding-top: 18px;
      border-top: 1px solid var(--rule);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-2);
    }
    @media (max-width: 480px) { .panel { padding: 36px 28px; } .wordmark { font-size: 32px; } }
  </style>
</head>
<body>
  <main class="panel" role="main" aria-label="ministr — under construction">
    <p class="eyebrow"><b>●</b>&nbsp; under construction</p>
    <div class="brand">
      <svg class="logo" viewBox="0 0 926 926" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="ministrLogoA" x1="1098.5" y1="-174" x2="-173.5" y2="1092" gradientUnits="userSpaceOnUse">
            <stop stop-color="#F8AC18"/>
            <stop offset="1" stop-color="#FF9900"/>
          </linearGradient>
        </defs>
        <path fill-rule="evenodd" clip-rule="evenodd" d="M926 926H0V0H926V926ZM241 241V685H685V241H241Z" fill="url(#ministrLogoA)"/>
      </svg>
      <h1 class="wordmark">ministr<span class="dot">.</span><span class="cursor">_</span></h1>
    </div>
    <p class="line">
      Something new is on the way. Back soon.
    </p>
    <p class="foot">ministr.ai · coming soon</p>
  </main>
</body>
</html>
