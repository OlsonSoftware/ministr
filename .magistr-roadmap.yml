    checked: false
  - text: Create reproducible benchmark suite — ingestion throughput, search latency, prefetch hit rate across corpus sizes
    checked: false
  - text: Build sample evaluation corpus — curated set of Markdown/HTML/PDF docs with ground-truth retrieval annotations
    checked: false
  - text: Set up cross-compilation CI — pre-built binaries for Linux x86_64, Linux aarch64, macOS Apple Silicon, Windows
