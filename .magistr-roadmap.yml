title: iris — Roadmap
preamble: Context cache controller for LLM agents, implemented as a Rust MCP server.
phases:
- id: P0
  name: Foundation
  status: done
  tasks:
  - text: Initialize Cargo workspace with iris-core, iris-mcp, iris-cli crates and edition = "2024"
    checked: true
  - text: 'Add #![deny(unsafe_code)] to all crate roots and configure workspace-level dependencies'
    checked: true
  - text: Configure clippy (pedantic + deny warnings), rustfmt, cargo-deny, and cargo-audit
    checked: true
  - text: Create justfile with build, test, lint, fmt, coverage, audit, deny, and validate recipes
    checked: true
  - text: Set up GitHub Actions CI workflow calling just validate on push/PR
    checked: true
  - text: Define core error types with thiserror — IndexError, SessionError, StorageError, ParseError in iris-core
    checked: true
  - text: Set up tracing infrastructure with tracing-subscriber, EnvFilter, and structured JSON output
    checked: true
  - text: 'Define core domain types: ContentId, SectionId, ClaimId, Resolution enum, DocumentTree, Section, Claim'
    checked: true
  - text: Add miette integration to iris-cli and iris-mcp for user-facing diagnostic errors
    checked: true
  - text: Create config.toml schema and loader for global iris configuration (~/.iris/config.toml)
    checked: true
  - text: Write unit tests for error types, config loading, and domain type construction
    checked: true
- id: P1
  name: Multi-Resolution Index
  status: done
  tasks:
  - text: Create ~/.iris/corpora/<name>/ on-disk layout with meta.toml, content.db, sessions/
    checked: true
  - text: Implement SQLite schema — documents, sections, claims, summaries tables with parent-child relationships
    checked: true
  - text: Add file_hashes table for tracking source file content hashes (incremental re-indexing)
    checked: true
  - text: Configure WAL journal mode, NORMAL synchronous, and busy timeout for concurrent reads
    checked: true
  - text: Implement Storage trait in iris-core with CRUD operations for documents, sections, claims
    checked: true
  - text: Wrap rusqlite Connection with tokio::spawn_blocking for async-safe database access
    checked: true
  - text: Add schema migration system (versioned migrations, forward-only) for future upgrades
    checked: true
  - text: Implement corpus configuration (meta.toml) — source directories, embedding model choice, parser settings
    checked: true
  - text: Write integration tests against real SQLite — CRUD, concurrent reads, WAL behavior, migration rollforward
    checked: true
- id: P2
  name: Session Intelligence
  status: done
  tasks:
  - text: Define DocumentParser trait — parse(path) -> Result<DocumentTree> with format-agnostic interface
    checked: true
  - text: Implement MarkdownParser using comrak AST — walk nodes to build structural section tree
    checked: true
  - text: Generate stable hierarchical section IDs from heading paths (e.g., docs/auth.md#3-2-error-handling)
    checked: true
  - text: Preserve code blocks, tables, and lists as typed structural nodes within sections
    checked: true
  - text: Implement heuristic claim extraction — sentence splitting, named entity filtering, assertion detection
    checked: true
  - text: Implement extractive summary generation — TF-IDF top-k sentence selection per section and per document
    checked: true
  - text: Build ingestion pipeline orchestrator — parse, section, extract claims, summarize, store to SQLite
    checked: true
  - text: 'Handle edge cases: documents without headings (paragraph-boundary splitting), empty sections, nested lists'
    checked: true
  - text: Implement incremental re-indexing — compare file hashes, re-parse only changed files, update only changed sections
    checked: true
  - text: Add token counting utility (cl100k_base compatible) for accurate budget tracking on all content units
    checked: true
  - text: Write tests for Markdown parsing — heading hierarchy, code blocks, tables, GFM extensions, frontmatter
    checked: true
  - text: Write tests for claim extraction quality — precision/recall on a hand-labeled test corpus
    checked: true
- id: P3
  name: Polish & Release
  status: done
  tasks:
  - text: Define Embedder trait in iris-core — embed(texts) -> Result<Vec<Vec<f32>>> with batch support
    checked: true
  - text: Implement FastEmbedder using fastembed crate with all-MiniLM-L6-v2 (384d) via ONNX Runtime
    checked: true
  - text: Add model download and caching — first-run model fetch with progress, cached in ~/.iris/models/
    checked: true
  - text: Implement configurable model selection — support swapping embedding models via corpus meta.toml
    checked: true
  - text: Define VectorIndex trait — insert, search_knn, delete, persist, load operations
    checked: true
  - text: Implement HnswIndex using hnswlib-rs — decoupled graph/storage, cosine similarity, configurable M and ef
    checked: true
  - text: Add memory-mapped persistence for the HNSW index (vectors.hnsw + vectors.meta) via memmap2
    checked: true
  - text: Embed all three resolution levels at ingestion — summaries, sections, and claims get separate vectors
    checked: true
  - text: Build multi-resolution query pipeline — search across summary/section/claim levels, merge and rank results
    checked: true
  - text: Implement resolution-aware result scoring — weight results by resolution level and query specificity
    checked: true
  - text: Add incremental vector index updates — insert/delete embeddings for changed sections without full rebuild
    checked: true
  - text: Write benchmarks for embedding throughput (docs/sec) and search latency (p50/p99) at 1k/10k/100k sections
    checked: true
  - text: Write tests for vector index — insert/search/delete correctness, persistence round-trip, concurrent reads
    checked: true
- id: P4
  name: MCP Server & Core Tools
  tagline: Wire up rmcp and expose iris_survey, iris_read, iris_extract as MCP tools
  status: done
  problem: The agent needs a standards-compliant MCP interface to discover, survey, read, and extract context from the index — the progressive disclosure model that replaces one-shot RAG
  solution: Implement ServerHandler via rmcp with stdio transport, exposing the three core tools (iris_survey, iris_read, iris_extract) plus iris://status and iris://corpus resources. Include budget_status in every response
  tasks:
  - text: 'Implement ServerHandler trait via rmcp with stdio transport and #[tool] macro-based tool registration'
    checked: true
  - text: Wire up iris-cli binary entry point — argument parsing (clap), corpus path, config loading, server startup
    checked: true
  - text: Implement iris_survey tool — vector search over section embeddings, return ranked summaries with relevance scores
    checked: true
  - text: Implement iris_read tool — full section text by hierarchical ID with heading_path and claims_available count
    checked: true
  - text: Implement iris_extract tool — claim-level retrieval within a specific section, filtered by query relevance
    checked: true
  - text: Add budget_status object to every tool response — tokens_used, tokens_remaining, pressure_level
    checked: true
  - text: Expose MCP resources — iris://status (index stats) and iris://corpus/{path} (document metadata)
    checked: true
  - text: 'Add #[instrument] tracing spans to all MCP tool handlers with request/response logging at DEBUG level'
    checked: true
  - text: Implement graceful error handling — map iris-core errors to MCP ErrorData with user-friendly messages
    checked: true
  - text: Write end-to-end integration test — start MCP server, send JSON-RPC tool calls, verify responses
    checked: true
  - text: Test with real MCP client (Claude Code) — verify tool discovery, survey/read/extract flow on a sample corpus
    checked: true
- id: P5
  name: Session Shadow & Budget Management
  tagline: Track what the agent has, estimate what it lost, manage the budget
  status: done
  problem: No existing retrieval system knows what context the agent already has. Without session state, iris would re-deliver identical content every turn — the worst possible use of scarce context window tokens
  solution: Implement the session shadow (delivered items + window estimation), deduplication, fault-based eviction correction, budget tracking with pressure mode, and the iris_budget/iris_compress/iris_evicted tools
  tasks:
  - text: Implement Session struct — id, created_at, agent_context_budget, delivered BTreeMap, trajectory vector
    checked: true
  - text: Implement DeliveredItem tracking — content_id, resolution, token_count, turn_delivered, content_hash
    checked: true
  - text: Build window estimation model — cumulative token tracking with configurable FIFO/LRU eviction assumption
    checked: true
  - text: Implement deduplication — compare incoming results against session shadow, skip already-delivered content
    checked: true
  - text: Implement delta updates — detect when a previously-delivered section has changed, return only the diff
    checked: true
  - text: Implement fault-based correction — detect re-requests as eviction signals, update window estimate
    checked: true
  - text: Implement iris_evicted tool — accept explicit agent feedback on dropped content_ids
    checked: true
  - text: Build budget tracker — configurable max_context_tokens, threshold-based pressure mode (default 80%)
    checked: true
  - text: Implement pressure mode behavior — auto-compress responses to claim-level, attach eviction recommendations
    checked: true
  - text: Implement eviction ranking — score delivered content by recency, relevance decay, and dependency graph
    checked: true
  - text: Implement iris_budget tool — return total_budget, estimated_used, pressure_level, eviction_candidates
    checked: true
  - text: Implement iris_compress tool — generate compressed summaries for content the agent wants to evict
    checked: true
  - text: Add session persistence to SQLite — save/restore session shadows for crash recovery
    checked: true
  - text: Write exhaustive tests for session shadow — deduplication, fault correction, window estimation accuracy
    checked: true
  - text: Write tests for budget manager — pressure mode transitions, eviction ranking, compression token savings
    checked: true
- id: P6
  name: Prefetch Engine & Coherence
  tagline: Predict what the agent needs next and notify when source documents change
  status: done
  problem: Every cold retrieval costs 50-200ms and a tool-call round-trip. Without prefetching, agents make 3x more tool calls than necessary. Without coherence, stale context causes hallucinations
  solution: Build three prefetch heuristics (sequential, topical, structural locality) with an LRU warm cache, file watching via notify crate for coherence alerts, and the iris_related tool for claim dependency traversal
  tasks:
  - text: Implement sequential prefetch — when agent reads section N, pre-warm section N+1 and parent summary
    checked: true
  - text: Implement topical prefetch — maintain running topic vector from last K sections, pre-warm nearest un-accessed sections
    checked: true
  - text: Implement structural prefetch — pre-warm sibling sections and cross-referenced sections from document tree
    checked: true
  - text: Build LRU prefetch cache (default 50 items) with pre-computed text, token count, and relevance score
    checked: true
  - text: Wire prefetch into tool response path — serve from warm cache (<1ms) or fall through to cold retrieval
    checked: true
  - text: Add prefetch hit rate metrics — track warm/cold responses per session, expose via iris://status resource
    checked: true
  - text: Implement iris_related tool — claim dependency traversal (references, contradicts, depends_on, updates)
    checked: true
  - text: Build claim relationship index — detect cross-references and co-occurring entities between claims at ingestion
    checked: true
  - text: Implement file watcher using notify crate — watch corpus source directories for changes
    checked: true
  - text: Build coherence protocol — on file change, re-index affected sections, generate coherence_alert notifications
    checked: true
  - text: Send MCP notifications for stale content — push changed_sections and stale_content_ids to connected agents
    checked: true
  - text: Invalidate session shadow entries when underlying content changes — mark stale, offer delta on next access
    checked: true
  - text: Write tests for prefetch engine — hit rate measurement, sequential/topical/structural prediction accuracy
    checked: true
  - text: Write tests for coherence — file change detection, re-indexing correctness, notification delivery, shadow invalidation
    checked: true
- id: P7
  name: Polish, Parsers & Release
  tagline: Additional format support, cross-session analytics, docs, benchmarks, and v0.1.0
  status: done
  problem: Markdown-only limits usefulness. Without benchmarks and documentation, adoption is blocked. Without cross-session learning, prefetch never improves beyond session-local heuristics
  solution: Add HTML and PDF parsers, cross-session analytics for prefetch tuning, comprehensive mdBook documentation, a reproducible benchmark suite, pre-built binaries for all platforms, and cut the v0.1.0 release
  tasks:
  - text: Implement HtmlParser using scraper + html2text — extract sections from semantic HTML (h1-h6, article, section tags)
    checked: true
  - text: Implement PdfParser using pdf-extract or lopdf — page-boundary splitting, heading detection from font size
    checked: true
  - text: Add parser auto-detection — select parser based on file extension, with manual override in corpus config
    checked: true
  - text: Implement cross-session analytics — track frequently-accessed sections, co-access patterns, per-corpus statistics
    checked: true
  - text: Feed cross-session data into prefetch — prioritize frequently-accessed and co-accessed sections for pre-warming
    checked: true
  - text: Build mdBook documentation site — architecture overview, getting started guide, tool reference, configuration
    checked: true
  - text: 'Write doc tests for all public APIs in iris-core — non-trivial examples with # Examples sections'
    checked: true
  - text: Create reproducible benchmark suite — ingestion throughput, search latency, prefetch hit rate across corpus sizes
    checked: true
  - text: Build sample evaluation corpus — curated set of Markdown/HTML/PDF docs with ground-truth retrieval annotations
    checked: true
  - text: Set up cross-compilation CI — pre-built binaries for Linux x86_64, Linux aarch64, macOS Apple Silicon, Windows
    checked: true
  - text: Add installation methods — cargo install, homebrew tap, GitHub release binaries with checksums
    checked: true
  - text: Write MCP client configuration examples — Claude Code, Cursor, and generic JSON-RPC client setup guides
    checked: true
  - text: Final audit — cargo audit, cargo deny check, full test suite, clippy clean, benchmark baselines recorded
    checked: true
  - text: Tag and publish v0.1.0 release — changelog, GitHub release with binaries, crates.io publish
    checked: true
- id: I0
  name: Ingestion Pipeline Integration
  tagline: Make iris actually read the corpus on startup
  status: done
  problem: iris starts with an empty database — corpus files are never parsed or indexed on startup, making all tools return empty results.
  solution: Wire ingest_directory_with_embeddings into the CLI startup path, persist the vector index after ingestion, and implement incremental re-indexing via file hashes.
  tasks:
  - text: Call ingest_directory_with_embeddings in CLI main.rs after initializing storage/embedder/index
    checked: true
  - text: Pass the user-provided --corpus path through to the ingestion pipeline (currently only used for corpus_name hashing)
    checked: true
  - text: Persist the HNSW vector index to disk after ingestion completes (call index.persist(&index_dir))
    checked: true
  - text: Implement incremental ingestion — skip files whose SHA-256 hash matches the stored hash, only re-index changed files
    checked: true
  - text: Log ingestion stats on startup (files scanned, sections created, embeddings generated, time elapsed)
    checked: true
- id: I1
  name: Server Lifecycle & Persistence
  tagline: Sessions and analytics survive restarts
  status: done
  problem: CLI uses IrisServer::new() which creates ephemeral sessions with no analytics — session state and cross-session learning are lost on restart.
  solution: Switch CLI to IrisServer::with_persistence(), pass corpus path and storage through, enable session restore and analytics.
  tasks:
  - text: Switch CLI from IrisServer::new() to IrisServer::with_persistence(), passing Arc&lt;SqliteStorage&gt; and budget config
    checked: true
  - text: Generate or restore a stable session ID per corpus (derive from corpus path hash) so sessions persist across restarts
    checked: true
  - text: Load budget config from IrisConfig (config.toml) instead of using BudgetConfig::default()
    checked: true
  - text: Verify analytics co-access patterns are recorded and served back via iris_budget prefetch_metrics
    checked: true
- id: I2
  name: Coherence & File Watching
  tagline: Detect file changes and keep the index fresh
  status: done
  problem: When corpus files change on disk, iris doesn't notice — stale content is served without alerts, and the index drifts from reality.
  solution: Spawn the FileWatcher and CoherenceEngine on startup, wire coherence events into session invalidation and re-ingestion.
  tasks:
  - text: Spawn FileWatcher on the corpus directory at CLI startup and feed events to CoherenceEngine
    checked: true
  - text: Wire CoherenceEngine.process_events to trigger re-ingestion of changed files and update the vector index
    checked: true
  - text: Propagate coherence alerts to active sessions via Session::invalidate_sections so stale content is flagged
    checked: true
  - text: Surface coherence_alerts in iris_read and iris_budget MCP tool responses when content has changed
    checked: true
- id: I3
  name: End-to-End Validation
  tagline: Prove it actually works from CLI to MCP response
  status: done
  problem: All 99 roadmap tasks were marked done but the system doesn't work end-to-end — need integration tests that prove the full pipeline.
  solution: Write E2E tests that start iris against a real corpus, verify ingestion populates the DB, and validate each MCP tool returns real results.
  tasks:
  - text: 'E2E test: start iris against a temp corpus dir, verify iris_survey returns ranked results'
    checked: true
  - text: 'E2E test: verify iris_read returns full section text with correct heading paths and content hashes'
    checked: true
  - text: 'E2E test: verify iris_extract returns claims from ingested content'
    checked: true
  - text: 'E2E test: verify iris_related follows claim dependency chains'
    checked: true
  - text: 'E2E test: verify session deduplication — iris_read same section twice returns skip/delta, not full content'
    checked: true
  - text: 'E2E test: verify iris_compress + iris_evicted cycle works and budget updates accordingly'
    checked: true
  - text: 'E2E test: modify a corpus file, verify coherence detects the change and iris_read returns updated content'
    checked: true
- id: I4
  name: Corpus Table of Contents Tool
  tagline: Let agents see the full corpus map in one call
  status: done
  problem: Agents can't browse what's in the corpus — they must guess query terms for iris_survey. If the first survey misses, the agent is blind to available content.
  solution: Add an iris_toc tool that returns the full document/section tree from storage. Reuse existing list_documents + list_sections APIs. Lightweight, no embedding needed — pure metadata query.
  tasks:
  - text: Add a toc() method to QueryService that calls storage.list_documents() + storage.list_sections(doc_id) for each doc, returns a Vec&lt;TocEntry&gt; tree
    checked: true
  - text: 'Define TocEntry struct in iris-core/types.rs: document_id, section_id, heading_path, depth, claims_available, token_count — no text content, metadata only'
    checked: true
  - text: Add iris_toc MCP tool handler in server.rs with optional document_id filter param — returns full tree when no filter, single doc tree when filtered
    checked: true
  - text: Include corpus_stats (total docs, total sections, total claims) in the iris_toc response header for quick orientation
    checked: true
  - text: 'Unit test: toc() returns correct tree structure for multi-doc corpus with nested headings'
    checked: true
  - text: 'E2E test: iris_toc via call_tool returns all documents and sections from the test fixture'
    checked: true
- id: I5
  name: Adaptive Section Merging
  tagline: Fewer, meatier chunks — fewer round trips
  status: done
  problem: Heading-based chunking produces many 1-2 sentence sections for small docs. Agents need 6+ reads to understand one concept, wasting round trips and token overhead on per-response JSON framing.
  solution: 'Add a post-parse merge pass in the ingestion pipeline: coalesce adjacent sibling sections below a configurable token threshold into their parent. Preserves heading structure for large docs, merges aggressively for small ones. NAACL 2025 research confirms fixed ~200-word chunks match semantic chunking — target that as the floor.'
  tasks:
  - text: 'Add a configurable min_section_tokens threshold to CorpusConfig (default: 50 tokens ~200 words) — sections below this are merge candidates'
    checked: true
  - text: 'Implement coalesce_small_sections(sections: Vec&lt;Section&gt;, min_tokens: usize) -> Vec&lt;Section&gt; in ingestion.rs — merges adjacent sibling sections (same depth) below threshold into their parent, concatenating text with heading markers'
    checked: true
  - text: 'Preserve section IDs for merged sections: use the parent''s section_id, store child heading_paths as sub-headings in the merged text so they remain searchable'
    checked: true
  - text: Wire coalesce_small_sections into ingest_directory_with_embeddings after parse + split_large_headingless but before enrichment and embedding — single insertion point, no duplication
    checked: true
  - text: 'Unit test: 3 sibling sections of 10/15/8 tokens merge into 1; a 200-token section stays untouched; mixed depths merge correctly at each level'
    checked: true
  - text: 'Unit test: merging preserves document order (position field) and updates claims_available counts on merged sections'
    checked: true
  - text: 'Integration test: ingest the iris docs corpus, verify section count decreases vs unmerged, and verify survey still returns relevant results for queries that would have matched child headings'
    checked: true
- id: I6
  name: Survey-Triggered Prefetch
  tagline: Predict the obvious next read after every survey
  status: done
  problem: When survey returns claim-level hits, the agent almost always reads the parent section next. But prefetch only triggers on iris_read, so the first read after survey is always a cold miss.
  solution: After survey, pre-warm parent sections of returned claim-level results into the prefetch cache. Reuse the existing PrefetchEngine.insert API and structural prefetch strategy. No new subsystems needed.
  tasks:
  - text: 'Extract parent section ID from claim content_id (strip the :cN suffix) — add a helper fn parent_section_id(claim_content_id: &str) -> Option&lt;&str&gt; in types.rs'
    checked: true
  - text: After survey returns results, collect unique parent section IDs from all claim-level results, fetch their SectionRecords from storage, and insert into PrefetchEngine with PrefetchStrategy::Structural
    checked: true
  - text: Skip pre-warming for sections already in the prefetch cache (PrefetchEngine.peek) or already delivered (session.is_delivered) — avoid redundant work
    checked: true
  - text: Add a new PrefetchStrategy::SurveyExpand variant to track hit rates separately from structural/sequential/topical strategies
    checked: true
  - text: 'Unit test: survey returning 3 claim hits from 2 different sections pre-warms exactly 2 parent sections, skips already-cached ones'
    checked: true
  - text: 'E2E test: survey then iris_read of a parent section hits the prefetch cache (verify via prefetch_metrics.hits increasing)'
    checked: true
- id: I7
  name: Expanded Corpus Support
  tagline: Index the docs that actually help agents reason
  status: done
  problem: Iris currently only indexes the mdBook docs — the DESIGN.md (633 lines of architecture rationale) and CHANGELOG.md are not included. The most useful content for an agent is *why* decisions were made, not the code itself.
  solution: Accept multiple corpus paths or a list of glob patterns in config. Index DESIGN.md, CHANGELOG.md, and any additional markdown alongside the docs/ tree. Reuse the existing recursive discover_files + incremental ingestion pipeline.
  tasks:
  - text: 'Extend IrisConfig with a corpus_paths: Vec&lt;PathBuf&gt; field alongside the existing single corpus path — backwards compatible, single path becomes a vec of one'
    checked: true
  - text: Support glob patterns in corpus_paths (e.g. "*.md", "docs/**") — resolve globs at startup using the existing discover_files recursive walker, deduplicate results
    checked: true
  - text: 'Update CLI --corpus flag to accept comma-separated paths or repeated flags: iris --corpus ./docs --corpus ./DESIGN.md --corpus ./CHANGELOG.md'
    checked: true
  - text: 'Wire multi-path ingestion in main.rs: iterate corpus_paths, call ingest_directory_with_embeddings for directories and ingest_file_with_embeddings for individual files'
    checked: true
  - text: Update .mcp.json default config to index ["./docs", "./DESIGN.md", "./CHANGELOG.md"] for the iris-rs project
    checked: true
  - text: 'Unit test: discover_files with mixed dirs and individual files returns correct combined list without duplicates'
    checked: true
  - text: 'E2E test: start iris with multi-path corpus, verify iris_toc shows documents from all paths and iris_survey finds content across sources'
    checked: true
- id: W1
  name: HTTP Foundation
  tagline: Async HTTP client for fetching web documentation
  status: done
  problem: iris cannot access documentation hosted on the web — agents must leave iris to fetch external docs, losing context continuity
  solution: Add reqwest-based async HTTP client with timeout, retries, and User-Agent handling as the foundation for all web fetching
  tasks:
  - text: Add `reqwest` (with rustls-tls feature) to workspace dependencies and iris-core Cargo.toml
    checked: true
  - text: Create `web` module in iris-core with async `HttpClient` wrapper — configurable timeout (default 30s), retry count (default 2), and User-Agent header identifying iris
    checked: true
  - text: 'Implement URL normalization: resolve relative URLs, strip fragments, normalize trailing slashes, validate scheme (http/https only)'
    checked: true
  - text: 'Unit tests for HttpClient: successful fetch, timeout handling, retry on 5xx, URL normalization edge cases'
    checked: true
- id: W2
  name: HTML to Markdown
  tagline: Clean markdown extraction from web pages
  status: done
  problem: Raw HTML is noisy and token-wasteful — nav bars, footers, ads, and scripts pollute the content
  solution: Build readability-style content extraction that identifies main content and converts to clean markdown, reusing the existing scraper crate
  tasks:
  - text: Build HTML-to-markdown converter using existing `scraper` crate — handle headings (h1-h6), paragraphs, code blocks (pre/code), ordered/unordered lists, tables, links, and images (as alt text)
    checked: true
  - text: 'Implement readability-style main content extraction: score DOM nodes by text density, strip nav/header/footer/sidebar/script/style elements, identify the `<main>` or `<article>` content container'
    checked: true
  - text: 'Unit tests for HTML→markdown: convert sample documentation pages (with nav bars, sidebars, code samples) to markdown, verify clean output preserves headings, code blocks, and content structure'
    checked: true
- id: W3
  name: llms.txt Support
  tagline: First-class support for the llms.txt documentation standard
  status: done
  problem: Many documentation sites (844K+) now publish llms.txt/llms-full.txt — pre-processed, curated content optimized for LLMs that iris should prefer over raw HTML crawling
  solution: Auto-detect and fetch llms.txt/llms-full.txt from domain roots, parse the markdown link list format, and use pre-processed content when available
  tasks:
  - text: 'Implement llms.txt fetcher: given a domain, try GET `https://{domain}/llms-full.txt` then `https://{domain}/llms.txt` — return content if found (200 OK with text/plain or text/markdown)'
    checked: true
  - text: 'Parse llms.txt markdown format: extract the H1 title, description blockquote, and categorized link lists (## sections with `- [title](url): description` entries)'
    checked: true
  - text: 'Unit tests: parse sample llms.txt files (Anthropic, Cursor style), verify title/description/link extraction; verify llms-full.txt is returned as raw markdown content'
    checked: true
- id: W4
  name: Web Fetch Pipeline
  tagline: 'Smart orchestration: llms.txt → sitemap → single page fetch'
  status: done
  problem: Different documentation sites require different fetching strategies — agents shouldn't need to know which one to use
  solution: Build WebFetcher that auto-selects the best strategy (llms.txt first, then sitemap, then direct fetch), converts to markdown, and feeds into the existing ingestion pipeline
  tasks:
  - text: 'Build `WebFetcher` orchestrator that auto-selects strategy: try llms-full.txt → llms.txt link list → sitemap.xml → direct page fetch, returning clean markdown for each discovered page'
    checked: true
  - text: Pipe WebFetcher output into existing IngestionPipeline — fetched markdown goes through section extraction, claim extraction, summarization, and embedding generation unchanged
    checked: true
  - text: Store fetched web content in `~/.iris/web/<url-hash>/` with metadata file (source URL, fetch timestamp, ETag, content hash, page count)
    checked: true
  - text: 'Integration test: fetch a URL via WebFetcher, verify sections and claims appear in storage and are searchable via QueryService'
    checked: true
- id: W5
  name: iris_fetch MCP Tool
  tagline: One tool to fetch any web documentation into the corpus
