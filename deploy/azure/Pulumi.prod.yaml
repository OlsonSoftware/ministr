  # PHASE4 chunk 5 — right-size the indexer Job now that the cloud
  # worker streams HNSW persistence every 4 files (`cmd_indexer_worker`
  # opts in via `streaming_persist_every: Some(4)`).
  #
  # Azure Container Apps Consumption profile only accepts specific
  # CPU/memory pairs — at 4 vCPU the only valid memory is 8 GiB; for
  # 4 GiB memory CPU must drop to 2. (The chunk-5 first attempt set
  # only jobMemory and pulumi up rejected the deploy with
  # ContainerAppInvalidResourceTotal.) Going with 2 vCPU / 4 GiB:
  # cost ≈ $1/h-when-running vs ~$4/h at the 4/8 default — 4× win.
  # Tradeoff: embedding throughput halves vs 4 vCPU, so a small repo
  # that took ~30s may now take ~60s. With KEDA scale-to-zero, idle
  # remains $0/mo regardless.
  ministr-azure:jobCpu: "2"
  ministr-azure:jobMemory: 4Gi
