# F5.4-c — defaults for the ministr-enterprise chart.
#
# Required overrides (the chart's required: filter will fail-fast at
# `helm install` if any of these are unset):
#
#   license.key           — RS256 JWT issued by the ministr license
#                           portal (F5.4-e). Pasted verbatim from the
#                           portal-provided text.
#   license.publicKey     — PEM-encoded SPKI public key shipped to
#                           you out-of-band by ministr.
#   postgres.url          — full Postgres connection string. Example:
#                           `postgres://user:pass@host:5432/ministr?sslmode=require`
#
# Everything else has working defaults.

replicaCount: 1

image:
  # The container image holding the cloud serve binary. Defaults to
  # the public registry; private deployments override to their own
  # mirror.
  repository: ghcr.io/ministr-ai/cloud
  # Image tag. Empty means use .Chart.AppVersion (currently "0.6.0").
  # Override per-deployment to pin a specific build.
  tag: ""
  pullPolicy: IfNotPresent

# Image-pull secret name if your registry requires authentication.
# Leave empty for public registries.
imagePullSecrets: []
# - name: my-registry-secret

# F5.4-a — license-key gate. Both fields REQUIRED for Enterprise
# mode; leaving them empty produces a templating error.
license:
  key: ""
  publicKey: ""

# Postgres connection. REQUIRED — the chart fails fast if unset.
# Customer brings their own DB (Cloud SQL, RDS, on-prem PG, etc).
postgres:
  url: ""

# Blob storage for HNSW index bundles + audit archive (F5.3-c-ii-archive).
# Optional — when both unset, the serve runs without blob backing and
# uses ephemeral pod-local storage (acceptable for dev / single-pod).
blob:
  # Azure Blob backend. Use one of (Azure | S3 | empty); the cloud
  # serve picks based on env vars set.
  azureAccount: ""
  azureContainer: ""
  # Audit archive directory (F5.3-c-ii-archive-fs). Set to a path
  # backed by a PV/PVC mount when using the FS sink for archive.
  auditArchiveDir: ""

service:
  type: ClusterIP
  port: 8080
  # Customer wires their own Ingress / Gateway / load balancer.
  # The chart intentionally doesn't ship an Ingress template;
  # variability across clusters is too high to template usefully.

resources:
  # Conservative defaults — adjust per the customer's seat count.
  # The serve is mostly idle between requests; indexing spikes CPU
  # transiently. Bump CPU limit for large corpora.
  limits:
    cpu: "2000m"
    memory: "2Gi"
  requests:
    cpu: "500m"
    memory: "512Mi"

# Probe path for liveness + readiness. The cloud serve exposes
# /healthz unconditionally.
healthz:
  path: /healthz
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# Pod-level overrides — defaults empty; customer-specific scheduling
# constraints go here.
nodeSelector: {}
tolerations: []
affinity: {}

# F5.4-c — additional env vars passed verbatim to the cloud serve.
# Map of NAME: VALUE pairs. Use this for SIEM exporter config
# (MINISTR_SIEM_HEC_URL, etc) or any other env-var-keyed cloud config.
extraEnv: {}
