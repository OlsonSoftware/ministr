{{/*
F5.4-c — Secret carrying the license + Postgres credentials. The
Deployment references these via env vars (`envFrom: secretKeyRef`)
rather than `value:` so they don't appear in `kubectl describe pod`
output or container env dumps.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ministr-enterprise.fullname" . }}-secret
  labels:
    {{- include "ministr-enterprise.labels" . | nindent 4 }}
type: Opaque
stringData:
  # F5.4-a license gate. Both REQUIRED — `required` template function
  # halts `helm install` with a clear message if either is empty.
  MINISTR_LICENSE_KEY: {{ required "license.key is required — get it from the ministr license portal (F5.4-e)" .Values.license.key | quote }}
  MINISTR_LICENSE_PUBLIC_KEY: {{ required "license.publicKey is required — ships out-of-band from ministr with your contract" .Values.license.publicKey | quote }}
  # Postgres connection string. REQUIRED — the chart fails fast if
  # unset because the cloud serve can't function without it.
  MINISTR_PG_URL: {{ required "postgres.url is required — full connection string to your Postgres" .Values.postgres.url | quote }}
