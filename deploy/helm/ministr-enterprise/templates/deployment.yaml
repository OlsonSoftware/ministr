{{/*
F5.4-c — single Deployment running the cloud serve. License-gated
via env vars sourced from the Secret; non-secret config via inline
env: stanza for transparency in `kubectl describe`.
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ministr-enterprise.fullname" . }}
  labels:
    {{- include "ministr-enterprise.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ministr-enterprise.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ministr-enterprise.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: cloud-serve
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # cmd_serve_http reads MINISTR_PG_URL + MINISTR_LICENSE_*
          # from env. The Secret holds the bearer material; the
          # ConfigMap (none today) would hold non-secret tunables.
          envFrom:
            - secretRef:
                name: {{ include "ministr-enterprise.fullname" . }}-secret
          env:
            {{- if .Values.blob.azureAccount }}
            - name: MINISTR_BLOB_AZURE_ACCOUNT
              value: {{ .Values.blob.azureAccount | quote }}
            {{- end }}
            {{- if .Values.blob.azureContainer }}
            - name: MINISTR_BLOB_AZURE_CONTAINER
              value: {{ .Values.blob.azureContainer | quote }}
            {{- end }}
            {{- if .Values.blob.auditArchiveDir }}
            - name: MINISTR_AUDIT_ARCHIVE_DIR
              value: {{ .Values.blob.auditArchiveDir | quote }}
            {{- end }}
            {{- range $name, $value := .Values.extraEnv }}
            - name: {{ $name | quote }}
              value: {{ $value | quote }}
            {{- end }}
          # The cloud serve always binds on 8080 inside the container;
          # service.port is the externally-mapped port.
          args:
            - "serve"
            - "--transport"
            - "http"
            - "--oauth"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8080"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ .Values.healthz.path }}
              port: http
            initialDelaySeconds: {{ .Values.healthz.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthz.periodSeconds }}
            timeoutSeconds: {{ .Values.healthz.timeoutSeconds }}
            failureThreshold: {{ .Values.healthz.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.healthz.path }}
              port: http
            initialDelaySeconds: {{ .Values.healthz.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthz.periodSeconds }}
            timeoutSeconds: {{ .Values.healthz.timeoutSeconds }}
            failureThreshold: {{ .Values.healthz.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
