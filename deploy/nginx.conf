# nginx reverse proxy for iris MCP server
# TLS termination + SSE passthrough
#
# Usage:
#   1. Replace iris.example.com with your domain
#   2. Update ssl_certificate paths for your Let's Encrypt / certbot setup
#   3. nginx -t && systemctl reload nginx

upstream iris {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name iris.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name iris.example.com;

    ssl_certificate     /etc/letsencrypt/live/iris.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iris.example.com/privkey.pem;

    # MCP endpoint — Streamable HTTP with SSE
    location /mcp {
        proxy_pass http://iris;
        proxy_http_version 1.1;

        # Required for SSE (Server-Sent Events)
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # MCP sessions can be long-lived
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Forward client info for OAuth issuer URL
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # OAuth well-known endpoints
    location /.well-known/ {
        proxy_pass http://iris;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OAuth endpoints
    location /oauth/ {
        proxy_pass http://iris;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
