[corpus]
paths = [
    # Source code
    "iris-core/src",       # Core domain logic: ingestion, indexing, embedding, search, bridge extraction
    "iris-mcp/src",        # MCP server: tool handlers, request routing, session management
    "iris-cli/src",        # CLI entry point: startup, config loading, background ingestion

    # Documentation
    "docs",                # mdBook documentation: architecture, concepts, getting started
    "DESIGN.md",           # Design specification
    "CHANGELOG.md",        # Release history

    # Agent config and project context
    "CLAUDE.md",           # Project overview and conventions
    ".claude/rules",       # Agent rules: conventions, workflow, tools
    ".magistr-roadmap.yml", # Project roadmap
]

ignore = [
    "*.snap",              # Test snapshots
]
